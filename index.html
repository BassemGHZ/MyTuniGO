<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTunigo — Vivez le monde, comme chez vous</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --blue:#003580;--blue-l:#0071c2;--yellow:#FEBB02;--yellow-d:#e6a800;
    --green:#0d9e6e;--red:#cc0000;
    --gray-50:#f8f9fa;--gray-100:#f1f3f5;--gray-200:#e9ecef;--gray-300:#dee2e6;
    --gray-400:#ced4da;--gray-500:#adb5bd;--gray-600:#6c757d;--gray-700:#495057;
    --gray-800:#343a40;--gray-900:#212529;
    --shadow-sm:0 1px 3px rgba(0,0,0,.12);--shadow-md:0 4px 12px rgba(0,0,0,.15);--shadow-lg:0 8px 24px rgba(0,0,0,.18);
    --r-sm:4px;--r-md:8px;--r-lg:12px;--r-xl:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--gray-50);color:var(--gray-900);line-height:1.5;}
  a{text-decoration:none;color:inherit;}
  button{cursor:pointer;border:none;outline:none;font-family:inherit;}
  input,select,textarea{font-family:inherit;outline:none;}

  /* ===== HEADER ===== */
  .header{background:var(--blue);color:#fff;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md);}
  .header-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px;height:60px;}
  @media(max-width:768px){
    /* Excursions mobile */
    #exc-search{ font-size:16px !important; }
    .exc-cat-pills{ overflow-x:auto; flex-wrap:nowrap !important; padding-bottom:6px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .exc-cat-pills::-webkit-scrollbar{ display:none; }
    .exc-detail-main, .exc-detail-main *{word-break:break-word;overflow-wrap:anywhere;}
    .exc-detail-grid{grid-template-columns:1fr !important;display:flex !important;flex-direction:column !important;}
    .exc-detail-sidebar{order:2;}
    .exc-detail-main{order:1;}
    .exc-detail-sidebar > div{position:static !important;}
    .exc-price-grid{grid-template-columns:1fr !important;}
    .header-inner{padding:0 14px;height:56px;}
    .nav{display:none!important;}
  }
  .logo{font-size:22px;font-weight:800;cursor:pointer;flex-shrink:0;}
  .logo span{color:var(--yellow);}
  .nav{display:flex;gap:4px;margin-left:12px;}
  .nav-btn{background:transparent;color:rgba(255,255,255,.85);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid transparent;transition:all .2s;white-space:nowrap;}
  .nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff;}
  .header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
  .btn-login{background:transparent;color:#fff;padding:7px 14px;border-radius:var(--r-sm);font-size:14px;font-weight:500;border:1.5px solid rgba(255,255,255,.5);transition:all .2s;}
  .btn-login:hover{border-color:#fff;background:rgba(255,255,255,.1);}
  .btn-register{background:#fff;color:var(--blue);padding:7px 16px;border-radius:var(--r-sm);font-size:14px;font-weight:700;transition:background .2s;}
  .btn-register:hover{background:var(--gray-100);}

  /* user menu */
  .user-menu{position:relative;display:flex;align-items:center;gap:8px;}
  .user-avatar{width:34px;height:34px;border-radius:50%;background:var(--yellow);color:var(--gray-900);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid rgba(255,255,255,.4);}
  .user-name{font-size:14px;font-weight:600;color:#fff;cursor:pointer;}
  .user-dropdown{position:absolute;top:44px;right:0;background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);min-width:200px;overflow:hidden;border:1px solid var(--gray-200);z-index:200;animation:fadeDown .15s ease;}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .ud-header{padding:14px 16px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);}
  .ud-name{font-weight:700;font-size:15px;}
  .ud-email{font-size:12px;color:var(--gray-500);margin-top:2px;}
  .ud-item{padding:11px 16px;font-size:14px;color:var(--gray-700);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;}
  .ud-item:hover{background:var(--gray-50);}
  .ud-item.danger{color:var(--red);}

  /* ===== MODAL ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:var(--r-xl);width:100%;max-width:440px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:slideUp .25s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .modal-header{background:var(--blue);color:#fff;padding:24px 28px 20px;position:relative;}
  .modal-header h2{font-size:22px;font-weight:800;margin-bottom:4px;}
  .modal-header p{font-size:14px;opacity:.8;}
  .modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .modal-close:hover{background:rgba(255,255,255,.35);}
  .modal-body{padding:24px 28px 28px;}
  .modal-tabs{display:flex;margin-bottom:20px;border-radius:var(--r-md);overflow:hidden;border:1.5px solid var(--gray-200);}
  .m-tab{flex:1;padding:10px;font-size:14px;font-weight:600;background:#fff;color:var(--gray-600);border:none;cursor:pointer;transition:all .2s;}
  .m-tab.active{background:var(--blue);color:#fff;}
  .f-field{margin-bottom:14px;}
  .f-field label{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--gray-600);letter-spacing:.3px;display:block;margin-bottom:4px;}
  .f-field input{width:100%;padding:10px 13px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:15px;color:var(--gray-900);transition:border-color .2s;}
  .f-field input:focus{border-color:var(--blue-l);box-shadow:0 0 0 3px rgba(0,113,194,.1);}
  .f-field input.err{border-color:var(--red);}
  .f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:42px;}
  .pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:17px;color:var(--gray-400);}
  .str-bar{height:4px;border-radius:2px;margin-top:5px;transition:all .3s;background:var(--gray-200);}
  .str-lbl{font-size:11px;margin-top:3px;font-weight:600;color:var(--gray-400);}
  .btn-submit{width:100%;background:var(--yellow);color:var(--gray-900);padding:13px;border-radius:var(--r-md);font-size:16px;font-weight:800;transition:background .2s;margin-top:4px;}
  .btn-submit:hover{background:var(--yellow-d);}
  .btn-submit:disabled{background:var(--gray-300);color:var(--gray-500);cursor:not-allowed;}
  .m-footer{text-align:center;margin-top:14px;font-size:14px;color:var(--gray-500);}
  .m-footer a{color:var(--blue-l);font-weight:600;cursor:pointer;}
  .divider-or{display:flex;align-items:center;gap:10px;margin:14px 0;}
  .divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--gray-200);}
  .divider-or span{font-size:12px;color:var(--gray-400);font-weight:600;}
  .social-btn{width:100%;padding:10px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:14px;font-weight:600;color:var(--gray-700);background:#fff;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-bottom:8px;}
  .social-btn:hover{border-color:var(--gray-500);background:var(--gray-50);}
  .m-alert{padding:9px 13px;border-radius:var(--r-md);font-size:13px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .m-alert.err{background:#fff0f0;color:var(--red);border:1px solid #ffcccc;}
  .m-alert.ok{background:#e8f9f0;color:#0a6640;border:1px solid #a0e8c8;}
  .spinner-sm{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:var(--gray-900);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .demo-hint{margin-top:10px;padding:9px 12px;background:var(--gray-50);border-radius:var(--r-md);font-size:12px;color:var(--gray-500);text-align:center;}

  /* ===== HERO ===== */
  .hero{background:linear-gradient(135deg,#003580 0%,#0071c2 60%,#00a8e8 100%);padding:48px 20px 70px;overflow:hidden;position:relative;}
  .hero::before{content:'';position:absolute;right:-80px;top:-80px;width:400px;height:400px;background:rgba(255,255,255,.04);border-radius:50%;}
  .hero-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1;}
  .hero h1{color:#fff;font-size:32px;font-weight:800;margin-bottom:6px;}
  .hero p{color:rgba(255,255,255,.85);font-size:17px;margin-bottom:28px;}
  .search-box{background:#fff;border-radius:var(--r-lg);padding:12px;display:flex;gap:8px;align-items:stretch;box-shadow:0 8px 32px rgba(0,0,0,.25);flex-wrap:wrap;border:4px solid var(--yellow);}
  .s-field{display:flex;flex-direction:column;gap:2px;padding:6px 12px;border-radius:var(--r-sm);border:1.5px solid var(--gray-200);flex:1;min-width:140px;transition:border-color .2s;}
  .s-field:hover{border-color:var(--blue-l);}
  .s-field label{font-size:10px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.4px;}
  .s-field input{border:none;font-size:14px;font-weight:500;color:var(--gray-900);background:transparent;width:100%;padding:2px 0;}
  .s-field input:focus{outline:none;}
  .s-field input::placeholder{color:var(--gray-400);font-weight:400;}
  .btn-search{background:var(--yellow);color:var(--gray-900);font-weight:800;font-size:16px;padding:0 28px;border-radius:var(--r-md);transition:background .2s,transform .1s;white-space:nowrap;min-width:130px;}
  .btn-search:hover{background:var(--yellow-d);transform:translateY(-1px);}

  /* ===== SECTIONS ===== */
  .section{max-width:1200px;margin:0 auto;padding:40px 20px;}
  .sec-title{font-size:22px;font-weight:800;color:var(--gray-900);margin-bottom:6px;}
  .sec-sub{font-size:15px;color:var(--gray-600);margin-bottom:24px;}

  /* destinations */
  .dest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
  .dest-card{border-radius:var(--r-lg);overflow:hidden;cursor:pointer;position:relative;aspect-ratio:4/3;transition:transform .2s,box-shadow .2s;}
  .dest-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
  .dest-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;}
  .dest-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,0) 60%);}
  .dest-info{position:absolute;bottom:0;left:0;right:0;padding:12px 10px;color:#fff;}
  .dest-info h3{font-size:15px;font-weight:700;margin-bottom:2px;}
  .dest-info p{font-size:12px;opacity:.85;}

  /* hotel cards */
  .hotel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
  .hotel-card{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid var(--gray-200);}
  .hotel-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
  .hc-img{width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:52px;}
  .hc-body{padding:14px 16px 16px;}
  .hc-name{font-size:16px;font-weight:700;margin-bottom:4px;}
  .hc-loc{font-size:13px;color:var(--blue-l);margin-bottom:8px;}
  .hc-rating{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
  .r-badge{background:var(--blue);color:#fff;font-weight:800;font-size:13px;padding:4px 8px;border-radius:6px 6px 6px 0;}
  .r-label{font-size:13px;font-weight:600;color:var(--gray-700);}
  .r-count{font-size:12px;color:var(--gray-500);}
  .hc-price{font-size:20px;font-weight:800;}
  .hc-free{font-size:11.5px;color:var(--green);font-weight:600;margin-top:3px;}

  /* deals */
  .deals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
  .deal-card{background:#fff;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--gray-200);cursor:pointer;display:flex;transition:box-shadow .2s,transform .2s;}
  .deal-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
  .deal-img{width:110px;flex-shrink:0;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:40px;}
  .deal-body{padding:14px;flex:1;}
  .deal-badge{background:#d40000;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:6px;}
  .deal-name{font-size:15px;font-weight:700;margin-bottom:3px;}
  .deal-loc{font-size:12px;color:var(--gray-500);margin-bottom:8px;}
  .deal-prices{display:flex;align-items:center;gap:8px;}
  .deal-old{font-size:13px;color:var(--gray-500);text-decoration:line-through;}
  .deal-new{font-size:18px;font-weight:800;}

  /* ===== RESULTS PAGE ===== */
  .results-layout{max-width:1200px;margin:0 auto;padding:24px 20px;display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start;}
  .filters-panel{background:#fff;border-radius:var(--r-lg);border:1px solid var(--gray-200);padding:20px;position:sticky;top:76px;}
  .f-section{margin-bottom:22px;}
  .f-section:last-child{margin-bottom:0;}
  .f-title{font-size:13px;font-weight:800;color:var(--gray-800);margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px;}
  .f-opt{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;}
  .f-opt label{font-size:14px;color:var(--gray-700);cursor:pointer;flex:1;}
  .f-opt input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;}
  .price-vals{display:flex;justify-content:space-between;font-size:13px;color:var(--gray-600);margin-bottom:5px;}
  .price-vals strong{color:var(--gray-800);}
  input[type=range]{width:100%;accent-color:var(--blue);}
  .results-list{display:flex;flex-direction:column;gap:16px;}
  .results-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .results-count{font-size:20px;font-weight:700;}
  .sort-sel{padding:7px 12px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:14px;color:var(--gray-700);background:#fff;cursor:pointer;}
  .result-card{background:#fff;border-radius:var(--r-lg);border:1px solid var(--gray-200);overflow:hidden;display:flex;cursor:pointer;transition:box-shadow .2s,transform .2s;}
  .result-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
  .rc-img{width:230px;flex-shrink:0;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:56px;}
  .rc-body{padding:18px 20px;flex:1;display:flex;gap:16px;}
  .rc-info{flex:1;}
  .rc-name{font-size:18px;font-weight:700;color:var(--blue-l);margin-bottom:4px;}
  .rc-name:hover{text-decoration:underline;}
  .rc-type{font-size:12px;background:var(--gray-100);color:var(--gray-600);padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:8px;}
  .rc-loc{font-size:13px;color:var(--gray-500);margin-bottom:8px;}
  .rc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .rc-tag{font-size:12px;background:#e8f4ff;color:#0056b3;padding:3px 9px;border-radius:20px;font-weight:500;}
  .rc-desc{font-size:13px;color:var(--gray-600);line-height:1.5;}
  .rc-price{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;min-width:145px;padding:4px 0;}
  .rc-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .badge-green{font-size:12px;color:var(--green);font-weight:600;}
  .rc-amount{font-size:22px;font-weight:800;}
  .rc-excl{font-size:11px;color:var(--gray-500);}
  .btn-choose{background:var(--blue-l);color:#fff;padding:9px 16px;border-radius:var(--r-md);font-size:14px;font-weight:700;transition:background .2s;margin-top:6px;}
  .btn-choose:hover{background:var(--blue);}
  .pagination{display:flex;justify-content:center;gap:6px;margin-top:24px;}
  .pg-btn{width:36px;height:36px;border-radius:var(--r-md);background:#fff;border:1.5px solid var(--gray-300);font-size:14px;font-weight:600;color:var(--gray-700);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .pg-btn:hover{border-color:var(--blue-l);color:var(--blue-l);}
  .pg-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .no-results{text-align:center;padding:60px 20px;}
  .no-results h3{font-size:20px;font-weight:700;color:var(--gray-700);margin-bottom:8px;}
  .no-results p{color:var(--gray-500);}

  /* ===== DETAIL PAGE ===== */
  .detail-wrap{max-width:1200px;margin:0 auto;padding:24px 20px;}
  .det-name{font-size:26px;font-weight:800;margin-bottom:6px;}
  .det-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .stars-txt{color:var(--yellow-d);font-size:16px;}
  .det-loc{font-size:14px;color:var(--blue-l);}
  .gallery{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:200px 200px;gap:6px;border-radius:var(--r-lg);overflow:hidden;margin-bottom:24px;}
  .g-main{grid-row:span 2;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:90px;}
  .g-thumb{background:var(--gray-50);display:flex;align-items:center;justify-content:center;font-size:40px;}
  .det-body{display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start;}
  .det-section{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;margin-bottom:20px;}
  .det-sec-title{font-size:18px;font-weight:700;margin-bottom:14px;}
  .amen-grid-det{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .amen-item-det{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--gray-700);}
  .bk-box{background:#fff;border:2px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;position:sticky;top:76px;}
  .bk-price{font-size:26px;font-weight:800;margin-bottom:16px;}
  .bk-price span{font-size:14px;font-weight:400;color:var(--gray-500);}
  .bk-field{margin-bottom:12px;}
  .bk-field label{font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:4px;}
  .bk-field input,.bk-field select{width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:14px;color:var(--gray-800);}
  .bk-field input:focus,.bk-field select:focus{border-color:var(--blue-l);}
  .bk-div{border:none;border-top:1px solid var(--gray-200);margin:12px 0;}
  .bk-row{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;}
  .bk-row.total{font-weight:800;font-size:16px;padding-top:7px;border-top:2px solid var(--gray-200);margin-top:4px;}
  .btn-reserve{width:100%;background:var(--blue-l);color:#fff;padding:14px;border-radius:var(--r-md);font-size:16px;font-weight:800;transition:background .2s;margin-top:12px;}
  .btn-reserve:hover{background:var(--blue);}
  .bk-guarantees{margin-top:10px;display:flex;flex-direction:column;gap:5px;}
  .bk-g{font-size:13px;color:var(--green);font-weight:600;}
  .reviews{display:flex;flex-direction:column;gap:14px;}
  .rev-item{padding:12px 0;border-bottom:1px solid var(--gray-200);}
  .rev-item:last-child{border:none;}
  .rev-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .rev-av{width:36px;height:36px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
  .rev-name{font-weight:700;font-size:14px;}
  .rev-date{font-size:12px;color:var(--gray-500);}
  .rev-score{background:var(--blue);color:#fff;font-weight:800;font-size:13px;padding:3px 8px;border-radius:4px;}
  .rev-text{font-size:14px;color:var(--gray-600);line-height:1.6;}

  /* ===== CONFIRM PAGE ===== */
  .confirm-wrap{max-width:640px;margin:50px auto;padding:0 20px;}
  .confirm-card{background:#fff;border-radius:var(--r-xl);border:1px solid var(--gray-200);overflow:hidden;box-shadow:var(--shadow-md);}
  .confirm-hdr{background:var(--blue);color:#fff;padding:28px 28px 24px;}

  .confirm-body{padding:28px;}
  .sum-box{background:var(--gray-50);border-radius:var(--r-md);padding:16px;margin-bottom:22px;border:1px solid var(--gray-200);}
  .sum-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;}
  .sum-row span:first-child{color:var(--gray-500);}
  .sum-row span:last-child{font-weight:600;}
  .cf-form{display:flex;flex-direction:column;gap:12px;}
  .cf-field label{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--gray-600);letter-spacing:.3px;display:block;margin-bottom:4px;}
  .cf-field input{width:100%;padding:10px 14px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:15px;}

  .btn-confirm{width:100%;background:var(--yellow);color:var(--gray-900);padding:14px;border-radius:var(--r-md);font-size:16px;font-weight:800;transition:background .2s;margin-top:8px;}
  .btn-confirm:hover{background:var(--yellow-d);}
  .success-wrap{text-align:center;padding:32px;}
  .suc-icon{font-size:56px;margin-bottom:14px;}
  .suc-wrap h3{font-size:22px;font-weight:800;color:var(--green);margin-bottom:8px;}
  .suc-ref{font-family:monospace;font-size:15px;background:var(--gray-100);padding:8px 16px;border-radius:var(--r-md);display:inline-block;margin-top:10px;}

  /* ===== ANNONCE FORM ===== */
  .annonce-wrap{max-width:800px;margin:0 auto;padding:32px 20px 60px;}
  .ann-title{font-size:24px;font-weight:800;margin-bottom:6px;}
  .ann-sub{font-size:15px;color:var(--gray-600);margin-bottom:32px;}
  .stepper{display:flex;align-items:center;margin-bottom:32px;}
  .st-step{display:flex;align-items:center;gap:8px;flex:1;}
  .st-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--gray-300);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--gray-500);background:#fff;flex-shrink:0;transition:all .2s;}
  .st-circle.done{background:var(--green);border-color:var(--green);color:#fff;}
  .st-circle.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .st-label{font-size:12px;color:var(--gray-500);white-space:nowrap;}
  .st-label.active{color:var(--blue);font-weight:600;}
  .st-label.done{color:var(--green);}
  .st-line{flex:1;height:1.5px;background:var(--gray-200);margin:0 4px;}
  .st-line.done{background:var(--green);}
  .ann-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:28px;margin-bottom:20px;}
  .ann-sec{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--gray-200);}
  .type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:16px;}

  .type-btn:hover{border-color:var(--blue-l);}
  .type-btn.sel{border-color:var(--blue);background:rgba(0,53,128,.06);}
  .type-icon{font-size:24px;margin-bottom:6px;}
  .type-name{font-size:12px;font-weight:600;color:var(--gray-900);}
  .ann-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
  .ann-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:14px;}
  .ann-full{margin-bottom:14px;}
  .a-field label{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--gray-600);letter-spacing:.3px;display:block;margin-bottom:5px;}
  .a-field input,.a-field select,.a-field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:14px;color:var(--gray-900);transition:border-color .2s;}
  .a-field input:focus,.a-field select:focus,.a-field textarea:focus{border-color:var(--blue-l);}
  .a-field input.err,.a-field select.err,.a-field textarea.err{border-color:var(--red);}
  .a-field textarea{resize:vertical;min-height:90px;line-height:1.6;}
  .a-field .hint{font-size:11px;color:var(--gray-500);margin-top:4px;}
  .amen-grid-ann{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px;}
  .amen-item-ann{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);cursor:pointer;font-size:13px;color:var(--gray-700);background:#fff;transition:all .15s;}
  .amen-item-ann:hover{border-color:var(--blue-l);}
  .amen-item-ann.sel{border-color:var(--blue);color:var(--blue);background:rgba(0,53,128,.05);}
  .amen-chk{width:16px;height:16px;border:1.5px solid var(--gray-300);border-radius:3px;margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
  .amen-item-ann.sel .amen-chk{background:var(--blue);border-color:var(--blue);color:#fff;}
  .photo-zone{border:1.5px dashed var(--gray-400);border-radius:var(--r-lg);padding:2.5rem;text-align:center;cursor:pointer;margin-bottom:16px;background:var(--gray-50);transition:border-color .2s;}
  .photo-zone:hover{border-color:var(--blue-l);}
  .photo-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:12px;}
  .photo-thumb{border-radius:var(--r-md);aspect-ratio:1;background:var(--gray-100);border:1px solid var(--gray-200);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;}
  .photo-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .badge-main{position:absolute;bottom:4px;left:4px;font-size:10px;background:var(--yellow);color:#222;padding:2px 6px;border-radius:3px;font-weight:600;}
  .price-row-ann{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
  .price-card{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:14px;}
  .price-card label{font-size:11px;color:var(--gray-600);display:block;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
  .pc-inp{display:flex;align-items:center;gap:6px;}
  .pc-inp span{font-size:16px;font-weight:600;color:var(--gray-500);}
  .pc-inp input{border:1.5px solid var(--gray-300);border-radius:var(--r-md);padding:7px 10px;font-size:15px;font-weight:600;width:100%;color:var(--gray-900);}
  .pc-inp input:focus{outline:none;border-color:var(--blue-l);}
  .cancel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:16px;}
  .cancel-btn{border:1.5px solid var(--gray-300);border-radius:var(--r-md);padding:12px 14px;cursor:pointer;background:#fff;transition:all .15s;}
  .cancel-btn:hover{border-color:var(--blue-l);}
  .cancel-btn.sel{border-color:var(--blue);background:rgba(0,53,128,.05);}
  .cancel-btn strong{font-size:13px;font-weight:700;color:var(--gray-900);display:block;margin-bottom:3px;}
  .cancel-btn span{font-size:12px;color:var(--gray-500);}
  .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .sum-item{background:var(--gray-50);border-radius:var(--r-md);padding:12px 14px;}
  .sum-item .sl{font-size:11px;color:var(--gray-500);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
  .sum-item .sv{font-size:14px;font-weight:600;color:var(--gray-900);}
  .price-highlight{background:rgba(0,53,128,.08);border:2px solid var(--blue);border-radius:var(--r-md);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .ph-label{font-size:13px;color:var(--gray-600);}
  .ph-price{font-size:24px;font-weight:800;color:var(--blue);}
  .ph-price small{font-size:13px;font-weight:400;color:var(--gray-500);}
  .amen-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
  .amen-tag{font-size:12px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:20px;padding:3px 10px;color:var(--gray-600);}
  .nav-btns{display:flex;justify-content:space-between;margin-top:22px;gap:12px;}
  .btn-back{padding:10px 22px;border-radius:var(--r-md);font-size:14px;font-weight:600;border:1.5px solid var(--gray-300);background:#fff;color:var(--gray-700);transition:all .15s;}
  .btn-back:hover{background:var(--gray-50);}
  .btn-next{background:var(--blue);color:#fff;padding:10px 26px;border-radius:var(--r-md);font-size:14px;font-weight:700;border:none;transition:background .15s;}
  .btn-next:hover{background:#002570;}
  .btn-publish{background:var(--yellow);color:var(--gray-900);padding:10px 26px;border-radius:var(--r-md);font-size:14px;font-weight:800;border:none;transition:background .15s;}
  .btn-publish:hover{background:var(--yellow-d);}
  .suc-annonce{text-align:center;padding:40px 20px;}
  .suc-annonce .suc-ic{font-size:60px;margin-bottom:16px;}
  .suc-annonce h2{font-size:24px;font-weight:800;color:var(--green);margin-bottom:10px;}
  .suc-annonce p{font-size:15px;color:var(--gray-600);max-width:460px;margin:0 auto 20px;line-height:1.7;}

  /* ===== BREADCRUMB ===== */
  .breadcrumb{max-width:1200px;margin:0 auto;padding:16px 20px 0;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-500);}
  .breadcrumb span{cursor:pointer;}
  .breadcrumb span:hover{color:var(--blue-l);text-decoration:underline;}
  .bc-sep{color:var(--gray-400);}

  /* ===== STATS BANNER ===== */
  .stats-banner{background:var(--blue);border-radius:var(--r-xl);margin:0 20px 40px;text-align:center;padding:48px 20px;}
  .stats-inner{max-width:1200px;margin:0 auto;}
  .stats-grid{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin-top:24px;}
  .stat-item{color:#fff;text-align:center;}
  .stat-num{font-size:28px;font-weight:800;color:var(--yellow);}
  .stat-lbl{font-size:14px;opacity:.8;}

  /* ===== FOOTER ===== */
  .footer{background:var(--gray-900);color:var(--gray-300);padding:48px 20px 24px;margin-top:60px;}
  .footer-inner{max-width:1200px;margin:0 auto;}
  .footer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:32px;margin-bottom:36px;}
  .footer-col h4{color:#fff;font-size:14px;font-weight:700;margin-bottom:14px;text-transform:uppercase;}
  .footer-col a{display:block;font-size:14px;color:var(--gray-400);margin-bottom:8px;cursor:pointer;}
  .footer-col a:hover{color:#fff;}
  .footer-logo{font-size:22px;font-weight:800;color:#fff;margin-bottom:10px;}
  .footer-logo span{color:var(--yellow);}
  .footer-bottom{border-top:1px solid var(--gray-700);padding-top:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .footer-bottom p{font-size:13px;color:var(--gray-500);}

  /* ===== TOAST ===== */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 24px;border-radius:40px;font-size:15px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:9999;white-space:nowrap;animation:slideUp .3s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* ===== RESPONSIVE ===== */
  @media(max-width:900px){
    .results-layout{grid-template-columns:1fr;}
    .filters-panel{position:static;}
    .result-card{flex-direction:column;}
    .rc-img{width:100%;height:200px;}
    .rc-body{flex-direction:column;}
    .rc-price{align-items:flex-start;flex-direction:row;flex-wrap:wrap;gap:12px;}
    .det-body{grid-template-columns:1fr;}
    .bk-box{position:static;}
    .gallery{grid-template-columns:1fr 1fr;grid-template-rows:auto;}
    .g-main{grid-row:span 1;height:220px;}
  }
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  /* ══════════════════════════════════════════════════════
   TABLET (≤1024px)
═══════════════════════════════════════════════════════ */
  @media(max-width:1024px){
    .results-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}
    .det-layout{grid-template-columns:1fr;}
    .bk-box{position:static;margin-top:20px;}
  }

/* ══════════════════════════════════════════════════════
   MOBILE (≤768px) — Design mobile-first complet
═══════════════════════════════════════════════════════ */
  @media(max-width:768px){
    /* ── Base ── */
    body{font-size:15px;}

    /* ── Header ── */
    .header-inner{padding:0 14px;height:56px;}
    .logo img{height:30px;}
    .nav{display:none;}
    .btn-login{padding:7px 14px;font-size:13px;}

    /* ── Hero ── */
    .hero{padding:40px 16px 32px;}
    .hero-title,.hero h1{font-size:26px;line-height:1.2;}

    .s-field:last-of-type{border-bottom:none;}
    .s-btn{width:100%;margin-left:0;margin-top:10px;padding:14px;border-radius:var(--r-lg);}

    /* ── Home sections ── */

    /* ── Hotel cards: 1 column ── */

    /* ── Deals grid: 1 column ── */

    /* ── Stats banner ── */
    .stats-banner{padding:32px 16px;}
    .stats-grid{grid-template-columns:repeat(2,1fr);gap:16px;}
    .stat-val{font-size:28px;}

    /* ── Detail page ── */
    .det-layout{grid-template-columns:1fr;}
    .det-section{padding:16px;}
    .det-title{font-size:22px;}
    .bk-box{position:static;margin-top:16px;border-radius:var(--r-lg);}
    .bk-fields{grid-template-columns:1fr;}
    .gallery{grid-template-columns:1fr;}
    .g-main{height:220px;}
    .g-thumb{display:none;}

    /* ── Confirm page ── */
    .confirm-wrap{padding:16px;}

    .confirm-hdr{padding:20px 16px;}

    .pay-grid{grid-template-columns:1fr!important;}

    /* ── Bottom nav mobile ── */
    .mobile-nav{display:flex;}

═══════════════════════════════════════════════════════ */
  @media(max-width:390px){

<!-- ========== BANDEAU 0% COMMISSION ========== -->
<div id="launch-banner" style="background:#1E2D4E;color:#fff;padding:9px 20px;text-align:center;position:relative;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;">
  <span style="font-size:13px;font-weight:500;">Réservez et publiez vos annonces</span>
  <span style="background:#E84B10;color:#fff;font-size:12px;font-weight:800;padding:4px 14px;border-radius:20px;">0% de commission</span>
  <span style="font-size:13px;font-weight:500;">Paiement sur place · Aucun frais caché</span>
  <button onclick="document.getElementById('launch-banner').style.display='none'" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px;">✕</button>
</div>

<div id="app"></div>
<div id="modal-root"></div>

<script>
/* ===================== DATA ===================== */
/* ===================== DEVICE DETECTION ===================== */
// ── Device detection ─────────────────────────────────────────────────────────
const DEVICE = {
  get mobile()  { return window.innerWidth <= 768; },
  get tablet()  { return window.innerWidth > 768 && window.innerWidth <= 1024; },
  get desktop() { return window.innerWidth > 1024; },
  get touch()   { return ('ontouchstart' in window) || navigator.maxTouchPoints > 0; },
  get type()    {
    const ua = navigator.userAgent.toLowerCase();
    if(/iphone|android.*mobile|windows phone/.test(ua)) return 'phone';
    if(/ipad|android(?!.*mobile)|tablet/.test(ua)) return 'tablet';
    return window.innerWidth <= 768 ? 'phone' : window.innerWidth <= 1024 ? 'tablet' : 'desktop';
  }

// Show device banner on first load
function showDeviceBanner(){
  const existing = document.getElementById('device-banner');
  if(existing) return;
  const type = DEVICE.type;
  if(type === 'desktop') return; // no banner needed on desktop
  const banner = document.createElement('div');
  banner.id = 'device-banner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:'+(type==='phone'?'#003580':'#0a5c3e')+';color:#fff;padding:8px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:between;gap:10px;';
  banner.innerHTML = '<span style="flex:1;">'+(type==='phone'?'📱 Version mobile activée':'📲 Version tablette activée')+' — Interface optimisée</span>'
    ;
  document.body.prepend(banner);
  setTimeout(()=>{ const b=document.getElementById('device-banner'); if(b) b.remove(); }, 4000);
}

// Re-render on orientation change / resize
window.addEventListener('resize', () => {
  const delta = Math.abs(window.innerWidth - (window._lastWidth||0));
  if(delta > 50){
    window._lastWidth = window.innerWidth;
    render();
  }
});
window._lastWidth = window.innerWidth;
// Show device banner when JS loads
setTimeout(showDeviceBanner, 500);

const COMMISSION_RATE = 0.07; // 7% prélevée par MyTunigo sur chaque réservation

// Calculate commission breakdown
function calcCommission(grossTotal){
  const commission = Math.round(grossTotal * COMMISSION_RATE);
  const netToHost  = grossTotal - commission;
  return { gross: grossTotal, commission, netToHost, rate: COMMISSION_RATE };
}

// Helper: get or create calendar for an annonce
function getCalForAnnonce(annonceId){
  if(!calendarData[annonceId]){
    calendarData[annonceId] = {blocked:[], minNights:1, maxNights:30, priceOverrides:{}};
  }
  return calendarData[annonceId];
}

// Check if a date is blocked for a given hotel (by matching against myAnnonces)
function isDateBlockedForHotel(hId, dateStr){
  // Find annonce matching this hotel
  const ann = appState.myAnnonces.find(a=>a.hotelId===hId);
  if(!ann) return false;
  const cal = calendarData[ann.id];
  return cal ? cal.blocked.includes(dateStr) : false;
}

const NAV_ID_KEYS = ['selectedHotelId','selectedAnnonceId','selectedConvId','selectedExcursionId','selectedHostId'];

function navigate(page, extra){
  const prevPage = appState.page;
  const prevIds = NAV_ID_KEYS.map(k=>appState[k]);

  if(extra) Object.assign(appState, extra);
  if(page !== 'annonce') appState.annoncePage = 0;
  appState.page = page;
  if(page === 'home'){
    // La page d'accueil repart toujours d'une recherche vierge, pour éviter
    // qu'un ancien critère de recherche (ville, dates) reste collé sans
    // que l'utilisateur s'en rende compte.
    appState.searchDest = '';
    appState.searchCheckIn = '';
    appState.searchCheckOut = '';
    appState.searchGuests = 2;
  }
  window.scrollTo(0,0);
  if(page==='detail' && extra?.selectedHotelId){
    logAnnonceView(extra.selectedHotelId);
  }

  // Historique navigateur : une nouvelle page ou un nouvel élément consulté
  // crée une entrée d'historique (bouton Retour fonctionnel). Un simple
  // changement d'onglet/filtre sur la MÊME page remplace l'entrée en cours,
  // pour ne pas polluer l'historique avec des micro-changements.
  const newIds = NAV_ID_KEYS.map(k=>appState[k]);
  const samePlace = page===prevPage && NAV_ID_KEYS.every((k,i)=>prevIds[i]===newIds[i]);
  const histState = { page, ids: Object.fromEntries(NAV_ID_KEYS.map(k=>[k, appState[k]])) };
  try{
    if(samePlace) history.replaceState(histState, '', '#'+page);
    else history.pushState(histState, '', '#'+page);
  }catch(e){ /* ignore (ex: sandbox sans accès à l'historique) */ }

  render();
}

window.addEventListener('popstate', function(e){
  if(e.state){
    if(e.state.ids) Object.assign(appState, e.state.ids);
    appState.page = e.state.page || 'home';
  } else {
    appState.page = 'home';
  }
  window.scrollTo(0,0);
  render();
});

async function logAnnonceView(hId){
  const h = hotels.find(x=>x.id===hId);
  if(!h?.annonceId) return; // pas une vraie annonce (démo)
  if(auth.currentUser && h.userId && auth.currentUser.id === h.userId) return; // l'hôte qui consulte sa propre fiche ne compte pas
  try{
    await _sb.from('annonce_views').insert([{ annonce_id: h.annonceId, viewer_id: auth.currentUser?.id || null }]);
  } catch(e){ console.warn('logAnnonceView:', e.message); }
}

/* ── Price range drag ── */
let _prDragging = null;

function priceDrawThumbs(){
  const lo = appState.filters.minPrice || 0;
  const hi = appState.filters.maxPrice || 410;
  const lPct = lo / 410 * 100;
  const hPct = hi / 410 * 100;
  const fill = document.getElementById('pr-fill');
  const tn   = document.getElementById('pr-tn');
  const tx   = document.getElementById('pr-tx');
  if(fill){ fill.style.left=lPct+'%'; fill.style.right=(100-hPct)+'%'; }
  if(tn)  tn.style.left = lPct+'%';
  if(tx)  tx.style.left = hPct+'%';
}

function priceStartDrag(e, which){
  e.stopPropagation();
  e.preventDefault();
  _prDragging = which;
  document.addEventListener('mousemove', priceDragMove);
  document.addEventListener('mouseup',   priceDragEnd);
  document.addEventListener('touchmove', priceDragMove, {passive:false});
  document.addEventListener('touchend',  priceDragEnd);
}

function priceDragMove(e){
  if(!_prDragging) return;
  e.preventDefault();
  const track = document.getElementById('pr-track');
  if(!track) return;
  const rect = track.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  let pct = (clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  const val = Math.round(pct * 410 / 5) * 5;
  if(_prDragging === 'min') priceMin(val, true);   // skipRefresh during drag
  else priceMax(val, true);
}

function priceDragEnd(){
  _prDragging = null;
  document.removeEventListener('mousemove', priceDragMove);
  document.removeEventListener('mouseup',   priceDragEnd);
  document.removeEventListener('touchmove', priceDragMove);
  document.removeEventListener('touchend',  priceDragEnd);
  refreshResults();  // update results only once, when drag ends
}

function priceTrackClick(e){
  if(e.target.id==='pr-tn'||e.target.id==='pr-tx') return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct  = (e.clientX - rect.left) / rect.width;
  const val  = Math.round(pct * 410 / 5) * 5;
  const lo   = appState.filters.minPrice || 0;
  const hi   = appState.filters.maxPrice || 410;
  if(Math.abs(val-lo) < Math.abs(val-hi)) priceMin(val);
  else priceMax(val);
}

function priceTrackTouch(e){
  if(e.target.id==='pr-tn'||e.target.id==='pr-tx') return;
  const rect  = e.currentTarget.getBoundingClientRect();
  const pct   = (e.touches[0].clientX - rect.left) / rect.width;
  const val   = Math.round(pct * 410 / 5) * 5;
  const lo    = appState.filters.minPrice || 0;
  const hi    = appState.filters.maxPrice || 410;
  if(Math.abs(val-lo) < Math.abs(val-hi)) priceMin(val);
  else priceMax(val);
}

function updatePwStrength(){
  const pw=document.getElementById('rf-password').value;
  const bar=document.getElementById('str-bar'); const lbl=document.getElementById('str-lbl');
  if(!pw){bar.style.cssText='';lbl.textContent='Entrez un mot de passe';lbl.style.color='var(--gray-400)';return;}
  let s=0;
  if(pw.length>=8)s++; if(pw.length>=12)s++; if(/[A-Z]/.test(pw))s++; if(/[0-9]/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw))s++;
  const lvls=[['25%','#e74c3c','Très faible'],['40%','#e67e22','Faible'],['60%','#f1c40f','Moyen'],['80%','#2ecc71','Fort'],['100%','#27ae60','Très fort']];
  const l=lvls[Math.min(s,4)];
  bar.style.cssText=`height:4px;border-radius:2px;background:${l[1]};width:${l[0]};transition:all .3s;`;
  lbl.textContent=l[2]; lbl.style.color=l[1];
}

async function handleLogin(){
  const email = document.getElementById('lf-email')?.value?.trim();
  const pw    = document.getElementById('lf-password')?.value;
  if(!email||!pw){showModalAlert('Veuillez remplir tous les champs.');return;}
  const btn = document.querySelector('.btn-submit');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner-sm"></span>';}

  const { data, error } = await _sb.auth.signInWithPassword({ email, password: pw });

  if(error){
    if(btn){btn.disabled=false;btn.textContent='Se connecter';}
    if(error.message.includes('Email not confirmed')){
      showModalAlert('Veuillez confirmer votre e-mail avant de vous connecter.');
    } else {
      showModalAlert('E-mail ou mot de passe incorrect.');
    }
    return;
  }

  const meta = data.user?.user_metadata || {};
  auth.currentUser = {
    id: data.user.id,
    role: meta.role || 'user',
    firstName: meta.first_name || email.split('@')[0],
    lastName:  meta.last_name  || '',
    email:     data.user.email,
    emailVerified: true,
    createdAt: data.user.created_at?.split('T')[0] || '',
    bankData: { preferredMethod: 'virement' }
  };
  closeModal();
  renderAuthArea();
  showToast('Bienvenue, ' + auth.currentUser.firstName + ' ! 🎉', 'var(--green)');
  const pending = appState._pendingPage;
  appState._pendingPage = null;
  navigate(pending || 'home');
}

/* ===================== DESTINATIONS POPULAIRES ===================== */
// Regroupe les vraies annonces publiées par ville, compte le nombre réel
// d'annonces par ville, trie par nombre décroissant, garde les 6 premières.
// Chaque destination affiche une vraie photo (celle de l'une de ses
// annonces) plutôt qu'un emoji générique.
function titleCaseCity(name){
  return name.trim().split(/\s+/).filter(Boolean)
    .map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
}

function titleCaseCity(name){
  return normalizeCityName(name);
}

// Normalise un nom de ville : espaces avant/après supprimés, espaces multiples
// réduits à un seul, casse uniformisée (Première Lettre En Majuscule).
// Utilisé à la fois à la saisie (formulaire d'annonce) et à l'affichage
// (destinations populaires), pour que "CHEBBA", " chebba " et "Chebba"
// soient toujours traités comme UNE seule et même ville.
function normalizeCityName(str){
  return (str||'').trim().replace(/\s+/g,' ').split(' ').filter(Boolean)
    .map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
}

function annNormalizeCity(){
  const el = document.getElementById('af-city');
  if(!el) return;
  const normalized = normalizeCityName(el.value);
  el.value = normalized;
  annSet('city', normalized);
}

function excNormalizeCity(){
  const el = document.getElementById('ef-city');
  if(!el) return;
  const normalized = normalizeCityName(el.value);
  el.value = normalized;
  excSet('city', normalized);
}

function getPopularDestinations(){
  const real = hotels.filter(h => h.annonceId && h.city && h.city.trim());
  const byCity = {};
  real.forEach(h=>{
    // Normalisation pour le regroupement : "CHEBBA", "Chebba", "chebba" doivent
    // compter comme une seule et même ville, quelle que soit la casse saisie par l'hôte.
    const key = h.city.trim().toLowerCase()+'|'+(h.country||'').trim().toLowerCase();
    if(!byCity[key]) byCity[key] = { name:titleCaseCity(h.city), country:h.country, count:0, photo:null, emoji:h.emoji||'📍' };
    byCity[key].count++;
    if(!byCity[key].photo && h.photos && h.photos.length>0) byCity[key].photo = h.photos[0];
  });
  return Object.values(byCity).sort((a,b)=>b.count-a.count).slice(0,6);
}

/* ===================== HÉBERGEMENTS EN VEDETTE ===================== */
// Algorithme de sélection (aucune vraie statistique de vues/réservations
// n'existe encore côté plateforme, donc on se base sur des signaux fiables
// disponibles dès aujourd'hui) :
//   1. Éligibilité : uniquement de vraies annonces publiées (h.annonceId
//      présent), avec au moins 1 photo — jamais de logement "vide".
//   2. Tri principal : nombre de photos décroissant (meilleur indicateur
//      de qualité/sérieux disponible actuellement).
//   3. Départage : ancienneté décroissante (les plus récentes en premier),
//      pour faire tourner la mise en avant plutôt que figer toujours les
//      4 mêmes annonces.
//   4. Limite à 4 résultats.
// À enrichir plus tard avec de vrais signaux (vues, taux de conversion,
// nombre de réservations) une fois les tables d'analytics en place.
function getFeaturedHotels(){
  const real = hotels.filter(h => h.annonceId && h.photos && h.photos.length > 0);
  real.sort((a,b) => {
    const photoDiff = (b.photos.length||0) - (a.photos.length||0);
    if(photoDiff !== 0) return photoDiff;
    // Les id 100000+i sont attribués dans l'ordre de récence (created_at desc
    // côté requête Supabase), donc id croissant = annonce plus récente.
    return a.id - b.id;
  });
  return real.slice(0,4);
}

function validateSearchDates(){
  const inEl  = document.getElementById('s-in');
  const outEl = document.getElementById('s-out');
  if(!inEl || !outEl) return;
  const ci = inEl.value;
  const co = outEl.value;
  const today = new Date().toISOString().split('T')[0];
  // Checkin cannot be in the past
  if(ci && ci < today){ inEl.value = today; }
  // Checkout must be after checkin
  if(ci && co && co <= ci){
    const minCo = new Date(ci);
    minCo.setDate(minCo.getDate()+1);
    outEl.value = minCo.toISOString().split('T')[0];
    showToast('📅 Date de départ ajustée','var(--blue)');
  }
  // Set min on checkout
  if(ci && outEl) outEl.min = new Date(new Date(ci).getTime()+86400000).toISOString().split('T')[0];
}

function getFiltered(){
  let list = hotels.filter(h=>{
    if(appState.searchDest && !h.city.toLowerCase().includes(appState.searchDest.toLowerCase()) && !h.country.toLowerCase().includes(appState.searchDest.toLowerCase())) return false;
    
    if(h.price < (appState.filters.minPrice||0)) return false;
    if((appState.filters.maxPrice||410) < 410 && h.price > (appState.filters.maxPrice||410)) return false;
    if(h.rating<appState.filters.minRating) return false;
    if(appState.filters.types.length>0){
      const tMatch = appState.filters.types.some(t => {
        if(t==='Maison') return h.type==='Maison' || h.type==='Villa';
        return h.type===t;
      });
      if(!tMatch) return false;
    }
    if(appState.filters.amenities.length>0 && !appState.filters.amenities.every(a=>h.features.includes(a))) return false;
    // Exclut les logements dont la capacité est inférieure au nombre de voyageurs recherché
    if(appState.searchGuests && (h.capacity||99) < appState.searchGuests) return false;
    // Exclut les annonces déjà réservées (confirmée/en attente) sur les dates recherchées
    if(appState.searchCheckIn && appState.searchCheckOut && h.annonceId
       && (appState._resultsUnavailableAnnonceIds||new Set()).has(h.annonceId)) return false;
    return true;
  });
  if(appState.sort==='price_asc') list.sort((a,b)=>a.price-b.price);
  else if(appState.sort==='rating') list.sort((a,b)=>b.rating-a.rating);
  return list;
}

let _resultsAvailKey = null; // 'checkin|checkout' déjà chargé, pour éviter de refetch inutilement
async function loadResultsAvailability(){
  const ci = appState.searchCheckIn, co = appState.searchCheckOut;
  if(!ci || !co){
    if(appState._resultsUnavailableAnnonceIds && appState._resultsUnavailableAnnonceIds.size){
      appState._resultsUnavailableAnnonceIds = new Set();
      refreshResults();
    }
    return;
  }
  const key = ci+'|'+co;
  if(_resultsAvailKey === key) return;
  const { data, error } = await _sb.from('reservations_availability')
    .select('logement_id')
    .lt('check_in', co)
    .gt('check_out', ci);
  if(error){ console.warn('loadResultsAvailability:', error.message); return; }
  _resultsAvailKey = key;
  appState._resultsUnavailableAnnonceIds = new Set((data||[]).map(r=>r.logement_id));
  appState.resultsPage = 1;
  refreshResults();
}

function initResultsMaps(){
  const filtered = getFiltered();
  const coords = filtered.filter(h=>h.lat&&h.lng).map(h=>({id:h.id,lat:h.lat,lng:h.lng,name:h.name,price:h.price||h.price_night,emoji:h.emoji}));
  const center = coords.length>0 ? [coords[0].lat, coords[0].lng] : [36.8065, 10.1815]; // Tunis par défaut

  // Mini map
  const miniEl = document.getElementById('results-mini-map-inner');
  if(miniEl && !miniEl._leaflet_id && coords.length>0){
    const mmap = L.map(miniEl, {zoomControl:false, dragging:false, scrollWheelZoom:false, attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mmap);
    coords.forEach(c=>{
      L.circleMarker([c.lat,c.lng],{radius:6,color:'#1E2D4E',fillColor:'#E84B10',fillOpacity:1,weight:2}).addTo(mmap);
    });
    const bounds = L.latLngBounds(coords.map(c=>[c.lat,c.lng]));
    mmap.fitBounds(bounds.pad(0.1));
    _resultsMiniMap = mmap;
  }

  // Full map
  if(appState.resultsView==='map'){
    const fullEl = document.getElementById('results-full-map');
    if(fullEl && !fullEl._leaflet_id){
      const fmap = L.map(fullEl, {scrollWheelZoom:true}).setView(center, 6);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB'}).addTo(fmap);
      coords.forEach(c=>{
        const icon = L.divIcon({
          className:'',
          html:'<div style="background:var(--blue);color:#fff;padding:4px 8px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.25);">'+(c.price||'?')+'€</div>',
          iconAnchor:[20,12]
        });
        L.marker([c.lat,c.lng],{icon}).addTo(fmap)
          .bindPopup('<strong>'+c.emoji+' '+c.name+'</strong><br>'+(c.price||'?')+'€ / nuit<br><a href="#" onclick="navigate(\'detail\',{selectedHotelId:'+c.id+'});return false;">Voir le logement →</a>');
      });
      if(coords.length>1){const b=L.latLngBounds(coords.map(c=>[c.lat,c.lng]));fmap.fitBounds(b.pad(0.15));}
      _resultsFullMap = fmap;
    }
  }
}

function effectivePrice(h){

}

// Calcule le total d'un séjour nuit par nuit : une promotion sur une date
// précise (date_discounts) prévaut sur la promo globale de l'annonce pour
// cette nuit-là ; les autres nuits utilisent la promo globale si active,
// sinon le plein tarif.
function computeNightlyTotal(h, checkIn, checkOut, rooms){
  rooms = rooms||1;
  if(!h || !checkIn || !checkOut) return 0;
  const promos = appState._bkDatePromos || {};
  let total = 0;
  let d = new Date(checkIn);
  const end = new Date(checkOut);
  while(d < end){
    const ds = d.toISOString().split('T')[0];
    const pct = promos[ds]!==undefined ? promos[ds] : (h.discount||0);
    const nightPrice = pct>0 ? Math.round(h.price*(1-pct/100)) : h.price;
    total += nightPrice;
    d.setDate(d.getDate()+1);
  }
  return total*rooms;
}

function paginationNumbers(current, total){
  let pages = [];
  if(total <= 7){
    for(let i=1;i<=total;i++) pages.push(i);
  } else {
    pages.push(1);
    if(current > 3) pages.push('…');
    for(let i=Math.max(2,current-1); i<=Math.min(total-1,current+1); i++) pages.push(i);
    if(current < total-2) pages.push('…');
    pages.push(total);
  }
  return pages;
}

    searchNights = Math.max(0, Math.round((new Date(appState.searchCheckOut)-new Date(appState.searchCheckIn))/86400000));

  return `<div class="result-card" onclick="navigate('detail',{selectedHotelId:${h.id}})" style="cursor:pointer;">

        </div>

function priceMin(v, skipRefresh){
  v = Math.max(0, Math.min(+v, (appState.filters.maxPrice||410) - 5));
  appState.filters.minPrice = v;
  appState.resultsPage = 1;
  const f = document.getElementById('pr-min');
  if(f) f.value = v;
  priceDrawThumbs();
  if(!skipRefresh) refreshResults();
}

function priceMax(v, skipRefresh){
  v = Math.min(410, Math.max(+v, (appState.filters.minPrice||0) + 5));
  appState.filters.maxPrice = v;
  appState.resultsPage = 1;
  const f = document.getElementById('pr-max');
  if(f) f.value = v;
  priceDrawThumbs();
  if(!skipRefresh) refreshResults();
}


function updatePriceF(v){
  appState.filters.maxPrice = parseInt(v);
  const el = document.getElementById('pv');
  if(el) el.textContent = v+(parseInt(v)>=410?'+':'')+'€';
  refreshResults();
}










function updateRatingF(v){appState.filters.minRating=v;appState.resultsPage=1;refreshResults();}
function toggleTypeF(t,c){if(c){if(!appState.filters.types.includes(t))appState.filters.types.push(t);}else{appState.filters.types=appState.filters.types.filter(x=>x!==t);}appState.resultsPage=1;refreshResults();}

function toggleFilterExpand(section){
  if(!appState.filterExpanded) appState.filterExpanded = {types:false,amenities:false,ratings:false};
  appState.filterExpanded[section] = !appState.filterExpanded[section];
  // Re-render just the filters panel (cheaper than full navigate)
  navigate('results');
}

function toggleFilter(section){
  // Collapse/expand the filter section body
  const el = document.getElementById('filter-'+section);
  const arrow = document.getElementById('arrow-'+section);
  if(!el) return;
  const collapsed = el.style.display === 'none';
  el.style.display = collapsed ? 'block' : 'none';
  if(arrow) arrow.style.transform = collapsed ? '' : 'rotate(-90deg)';
}
function toggleAmenF(a,c){if(c)appState.filters.amenities.push(a);else appState.filters.amenities=appState.filters.amenities.filter(x=>x!==a);appState.resultsPage=1;refreshResults();}
function updateSort(v){appState.sort=v;appState.resultsPage=1;refreshResults();}
function resetFilters(){
  appState.resultsPage=1;
  appState.filters = {minPrice:0, maxPrice:410, minRating:0, types:[], amenities:[]};
  appState.filterExpanded = {types:false, amenities:false, ratings:false};
  // Reset input fields
  const mn = document.getElementById('pr-min');
  const mx = document.getElementById('pr-max');
  if(mn) mn.value = 0;
  if(mx) mx.value = 410;
  // Reset price slider thumbs
  setTimeout(priceDrawThumbs, 80);
  navigate('results');
}
function refreshResults(){
  const old=document.querySelector('.results-layout');
  if(!old)return;
  const n=buildResults();
  old.parentNode.replaceChild(n.querySelector('.results-layout'),old);
  setTimeout(priceDrawThumbs,50);
  // Update the map area counter (outside .results-layout)
  const filtered = getFiltered();
  const mapCount = document.getElementById('map-result-count');
  if(mapCount) mapCount.textContent = filtered.filter(h=>h.lat&&h.lng).length;
  // If in map view, refresh the map markers with filtered results
  if(appState.resultsView==='map'){
    refreshFullMap();
  } else {
    refreshMiniMap();
  }
}

function refreshMiniMap(){
  const miniEl = document.getElementById('results-mini-map-inner');
  if(!miniEl) return;
  if(_resultsMiniMap){ _resultsMiniMap.remove(); _resultsMiniMap = null; miniEl._leaflet_id = null; }
  setTimeout(initResultsMaps, 50);
}

function refreshFullMap(){
  const fullEl = document.getElementById('results-full-map');
  if(!fullEl) return;
  // Remove existing map and reinit with filtered data
  if(_resultsFullMap){ _resultsFullMap.remove(); _resultsFullMap = null; delete fullEl._leaflet_id; }
  setTimeout(initResultsMaps, 50);
}

function renderStars(rating){
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  return '<span style="color:#F59E0B;font-size:14px;letter-spacing:1px;">'
    + '★'.repeat(full)
    + (half ? '½' : '')
    + '<span style="color:#D1D5DB;">'+'★'.repeat(empty)+'</span>'
    + '</span> '
    + '<span style="font-size:12px;font-weight:700;color:var(--gray-700);">'
    + rating.toFixed(1)+'</span>';
}

function calcNights(){
  const ci=document.getElementById('bk-ci')?.value||appState.checkIn||appState.searchCheckIn;
  const co=document.getElementById('bk-co')?.value||appState.checkOut||appState.searchCheckOut;
  if(!ci||!co)return 0;
  return Math.max(0,Math.round((new Date(co)-new Date(ci))/86400000));
}

function calcBkHTML(h){
  const ci = document.getElementById('bk-ci')?.value || appState.checkIn;
  const co = document.getElementById('bk-co')?.value || appState.checkOut;
  const n=calcNights();
  const rooms=parseInt(document.getElementById('bk-rooms')?.value||appState.rooms||1);
  if(n<=0)return `<div style="font-size:13px;color:var(--gray-500);text-align:center;padding:8px 0;">Sélectionnez vos dates pour voir le total</div>`;
  const sub = computeNightlyTotal(h, ci, co, rooms);
  const avgUnit = Math.round(sub/(n*rooms));
  const taxes=Math.round(sub*.1), total=sub+taxes;
  return `<div class="bk-row"><span>${avgUnit}€ (moy.) × ${n} nuit${n>1?'s':''} × ${rooms} ch.</span><span>${sub}€</span></div>
    <div class="bk-row"><span>Taxes et frais</span><span>${taxes}€</span></div>
    <div class="bk-row total"><span>Total</span><span>${total}€</span></div>`;
}

function updateBk(){
  const ciEl = document.getElementById('bk-ci');
  const coEl = document.getElementById('bk-co');
  const ci = ciEl?.value;
  const co = coEl?.value;

  // Enforce: checkout must be strictly after checkin
  if(ci){
    // Set min date for checkout = checkin + 1 day
    const minCo = new Date(ci);
    minCo.setDate(minCo.getDate()+1);
    const minCoStr = minCo.toISOString().split('T')[0];
    if(coEl) coEl.min = minCoStr;
    // If checkout <= checkin, auto-correct to checkin + 1
    if(co && co <= ci){
      const corrected = minCoStr;
      if(coEl) coEl.value = corrected;
      appState.checkOut = corrected;
      showToast('📅 Date de départ ajustée','var(--blue)');
    } else {
      appState.checkOut = co;
    }
  }

  // Set min date for checkin = today
  const todayStr = new Date().toISOString().split('T')[0];
  if(ciEl) ciEl.min = todayStr;

  // If checkin is in the past, reset it
  if(ci && ci < todayStr){
    if(ciEl) ciEl.value = todayStr;
    appState.checkIn = todayStr;
  } else {
    appState.checkIn = ci;
  }

  appState.rooms = parseInt(document.getElementById('bk-rooms')?.value||1);
  const h = hotels.find(x=>x.id===appState.selectedHotelId);
  if(h){
    document.getElementById('bk-calc').innerHTML = calcBkHTML(h);
    // Check availability
    const availEl = document.getElementById('bk-avail-warn');
    if(availEl && appState.checkIn && appState.checkOut){
      const ok = isDateRangeAvailable(h.id, appState.checkIn, appState.checkOut);
      availEl.style.display = ok ? 'none' : 'flex';
    }
  }
}

function isDateRangeAvailable(hId, checkIn, checkOut){
  if(!checkIn || !checkOut) return true;
  // Utilise l'ensemble réel (réservations Supabase + blocages hôte) chargé par le calendrier
  if(appState._bkUnavailable && appState._bkHotelId===hId){
    const start=new Date(checkIn), end=new Date(checkOut);
    for(let d=new Date(start); d<end; d.setDate(d.getDate()+1)){
      if(appState._bkUnavailable.has(d.toISOString().split('T')[0])) return false;
    }
    return true;
  }
  // Repli (calendrier pas encore chargé) : ancienne heuristique locale
  const ann = appState.myAnnonces.find(a=>
    a.name && hotels.find(h=>h.id===hId && (h.name===a.name || a.city===h.city))
  );
  if(!ann) return true;
  const cal = calendarData[ann.id];
  if(!cal || !cal.blocked.length) return true;
  const start = new Date(checkIn);
  const end   = new Date(checkOut);
  for(let d=new Date(start); d<end; d.setDate(d.getDate()+1)){
    const ds = d.toISOString().split('T')[0];
    if(cal.blocked.includes(ds)) return false;
  }
  return true;
}

function goConfirm(hId){
  appState.selectedHotelId=hId;
  appState.checkIn=document.getElementById('bk-ci')?.value||appState.checkIn;
  appState.checkOut=document.getElementById('bk-co')?.value||appState.checkOut;
  appState.rooms=parseInt(document.getElementById('bk-rooms')?.value||1);

  if(appState.checkIn && appState.checkOut){
    const nights = Math.round((new Date(appState.checkOut)-new Date(appState.checkIn))/86400000);

    // Get minNights: from hotel data directly (most reliable)
    const h = hotels.find(x=>x.id===hId);
    const minN = h?.minNights || 1;
    const maxN = h?.maxNights || 365;

    // ── Validate minimum nights ──
    if(nights < minN){
      showToast('⚠️ Séjour minimum : '+minN+' nuit'+(minN>1?'s':'')+' pour ce logement.','var(--red)');
      const bk = document.querySelector('.bk-box');
      if(bk){ bk.style.boxShadow='0 0 0 3px var(--red)'; setTimeout(()=>bk.style.boxShadow='',2500); }
      return;
    }

    // ── Validate maximum nights ──
    if(maxN && nights > maxN){
      showToast('⚠️ Séjour maximum : '+maxN+' nuits pour ce logement.','var(--red)');
      return;
    }

    // ── Validate availability ──
    if(!isDateRangeAvailable(hId, appState.checkIn, appState.checkOut)){
      showToast('⛔ Dates indisponibles. Choisissez d\'autres dates.','var(--red)');
      return;
    }
  } else {
    // No dates selected
    showToast('⚠️ Sélectionnez vos dates d\'arrivée et de départ.','var(--red)');
    return;
  }

  navigate('confirm');
}

/* ===================== VÉRIFICATION DE DISPONIBILITÉ (anti double-réservation) ===================== */
async function checkAnnonceDatesAvailable(annonceId, checkIn, checkOut){
  if(!annonceId || !checkIn || !checkOut) return true;
  const { data, error } = await _sb.from('reservations_availability')
    .select('check_in,check_out,status')
    .eq('logement_id', annonceId)
    .lt('check_in', checkOut)
    .gt('check_out', checkIn);
  if(error){
    console.error('checkAnnonceDatesAvailable error:', error.message);
    // En cas d'erreur réseau, on laisse passer plutôt que de bloquer injustement —
    // mais on log pour investiguer si ça se reproduit.
    return true;
  }
  return !(data && data.length > 0);
}

/* ===================== ANNONCE ===================== */
const ANN_STEPS=['Type & infos','Localisation','Photos','Tarifs','Récapitulatif'];

function buildAnnonce(){
  if(appState.annoncePublished) return buildAnnonceSuccess();
  const d=document.createElement('div');
  const cur=appState.annoncePage;
  const ad=appState.annonceData;
  d.innerHTML=`<div class="annonce-wrap">
    <h1 class="ann-title">📋 Déposer une annonce</h1>
    <p class="ann-sub">Publiez votre logement en quelques minutes et touchez des milliers de voyageurs.</p>
    <div class="stepper">${ANN_STEPS.map((s,i)=>`
      <div class="st-step">
        <div class="st-circle ${i<cur?'done':i===cur?'active':''}">${i<cur?'✓':i+1}</div>
        <span class="st-label ${i<cur?'done':i===cur?'active':''}">${s}</span>
      </div>${i<ANN_STEPS.length-1?`<div class="st-line ${i<cur?'done':''}"></div>`:''}`).join('')}
    </div>
    <div id="ann-step">${annStep(cur,ad)}</div>
  </div>`;
  return d;
}

function annStep(cur,ad){
  if(cur===0) return annStep0(ad);
  if(cur===1) return annStep1(ad);
  if(cur===2) return annStep2(ad);
  if(cur===3) return annStep3(ad);
  if(cur===4) return annStep4(ad);
  return '';
}

function annNavBtns(){
  const cur=appState.annoncePage;
  return `<div class="nav-btns">
    ${cur>0?`<button class="btn-back" onclick="annGo(-1)">← Précédent</button>`:'<span></span>'}
    ${cur<ANN_STEPS.length-1
      ?`<button class="btn-next" onclick="annGo(1)">Suivant →</button>`
      :`<button class="btn-publish" onclick="annPublish()">✓ Publier l'annonce</button>`}
  </div>`;
}

  </div>`).join('')}</div>
  <div class="ann-sec" style="margin-top:20px;">Informations générales</div>
  <div class="ann-row">
    <div class="a-field" style="flex:2;"><label>Nom de l'hébergement *</label>
      <input id="af-name" type="text" maxlength="70" placeholder="Ex : Appartement lumineux vue mer à Nice" value="${ad.name}" oninput="annSet('name',this.value)">

  const opts = countries.map(c=>c.startsWith('---')
    ? '<option disabled style="color:#aaa;font-style:italic">'+c+'</option>'
    : '<option '+(ad.country===c?'selected':'')+'>'+c+'</option>').join('');

  return `<div class="ann-card">
  <div class="ann-sec">Adresse de l'hébergement</div>

  <div class="ann-full a-field"><label>Adresse (numéro et rue) *</label>
    <input id="af-address" type="text" placeholder="Ex : 24 avenue des Lilas" value="${ad.address}" oninput="annSet('address',this.value)"></div>
  <div style="display:grid;grid-template-columns:2fr 1fr 2fr;gap:14px;margin-bottom:14px;">
    <div class="a-field"><label>Ville *</label><input id="af-city" type="text" maxlength="30" placeholder="Paris" value="${ad.city}" oninput="annSet('city',this.value)" onblur="annNormalizeCity()"></div>
    <div class="a-field"><label>Code postal</label><input id="af-zip" type="text" placeholder="75001" value="${ad.zip}" oninput="annSet(\'zip\',this.value)"></div>
    <div class="a-field"><label>Pays</label><select oninput="annSet(\'country\',this.value)">${opts}</select></div>
  </div>
  </div>
  <div style="margin-top:12px;">
    <button onclick="geocodeAddress()" style="background:var(--blue);color:#fff;padding:9px 20px;border-radius:var(--r-md);font-size:13px;font-weight:700;border:none;cursor:pointer;">🔍 Localiser sur la carte</button>
    <span style="font-size:12px;color:var(--gray-400);margin-left:10px;">La carte se centre sur votre adresse</span>
  </div>

  <!-- Carte -->
  <div style="margin-top:16px;">

      🗺️ <span>Localisation du bien <span style="color:var(--red);">*</span> — <strong>cliquez sur la carte pour positionner un point</strong></span>
    </div>
    <div id="ann-map" style="height:420px;border-radius:var(--r-lg);border:1.5px solid var(--gray-300);overflow:hidden;z-index:1;"></div>

    <textarea placeholder="À 5 min à pied de la gare, bus ligne 12…" oninput="annSet('access',this.value)">${ad.access}</textarea></div>
  ${annNavBtns()}
</div>`;
}

function annStep4(ad){
  const typeObj=TYPES_ANN.find(t=>t.id===ad.type);
  const amenObjs=ad.amenities.map(id=>AMENITIES_ANN.find(a=>a.id===id)).filter(Boolean);
  return `<div class="ann-card">
  <div class="ann-sec">Récapitulatif de votre annonce</div>
  <div class="price-highlight">
    <div><div class="ph-label">Prix par nuit</div><div style="font-size:12px;color:var(--gray-500)">Taxes incluses</div></div>
    <div class="ph-price">${ad.price_night||'—'}€ <small>/ nuit</small></div>
  </div>

function handlePhotoFiles(files){
  if(!files||files.length===0) return;
  const MAX_SIZE = 10 * 1024 * 1024; // 10MB
  const allowed = ['image/jpeg','image/png','image/webp','image/gif'];
  let loaded = 0;
  const total = files.length;
  Array.from(files).forEach(file => {
    if(!allowed.includes(file.type)){
      showToast('⚠️ Format non supporté : '+file.name,'var(--red)');
      loaded++; return;
    }
    if(file.size > MAX_SIZE){
      showToast('⚠️ Fichier trop lourd : '+file.name+' (max 10Mo)','var(--red)');
      loaded++; return;
    }
    const reader = new FileReader();
    reader.onload = function(e){
      appState.annonceData.photos.push({
        id: Date.now() + Math.random(),
        name: file.name,
        dataUrl: e.target.result,
        size: file.size,
      });
      loaded++;
      if(loaded === total){
        annRefresh();
        showToast('✅ '+total+' photo'+( total>1?'s':'')+' ajoutée'+(total>1?'s':''),'var(--green)');
      }
    };
    reader.onerror = function(){
      showToast('Erreur lecture : '+file.name,'var(--red)');
      loaded++;
    };
    reader.readAsDataURL(file);
  });
}

let dragSrcId = null;
function dragPhotoStart(e, id){
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
}
function dragPhotoEnd(e, targetId){
  if(dragSrcId === null || dragSrcId === targetId) return;
  const photos = appState.annonceData.photos;
  const srcIdx = photos.findIndex(p=>p.id===dragSrcId);
  const tgtIdx = photos.findIndex(p=>p.id===targetId);
  if(srcIdx<0||tgtIdx<0) return;
  const [moved] = photos.splice(srcIdx,1);
  photos.splice(tgtIdx,0,moved);
  dragSrcId = null;
  annRefresh();
}

async function uploadAnnoncePhotos(ref, photos){
  const urls = [];
  for(let i=0;i<photos.length;i++){
    const p = photos[i];
    try{
      const blob = await (await fetch(p.dataUrl)).blob();
      const extMatch = (p.name||'').match(/\.([a-zA-Z0-9]+)$/);
      const ext = extMatch ? extMatch[1].toLowerCase() : 'jpg';
      const path = ref+'/'+Date.now()+'_'+i+'.'+ext;
      const { error: upErr } = await _sb.storage.from('annonces-photos').upload(path, blob, { contentType: blob.type||'image/jpeg' });
      if(upErr){ console.warn('Upload photo échoué:', upErr.message); continue; }
      const { data: pub } = _sb.storage.from('annonces-photos').getPublicUrl(path);
      if(pub?.publicUrl) urls.push(pub.publicUrl);
    } catch(e){ console.warn('Erreur upload photo:', e.message); }
  }
  return urls;
}

      id: r.reference || r.id,
      _dbId: r.id,

      name: ((auth.currentUser.firstName||'')+' '+(auth.currentUser.lastName||'')).trim(),
      email: auth.currentUser.email||'',
      checkIn: r.check_in, checkOut: r.check_out,
      rooms: r.rooms||1, nights: r.nights||1,
      total: r.total||0, status: r.status||'confirmée',
      createdAt: r.created_at,
      _propName: ann.name || (h?h.name:'Hébergement'),
      _propCity: ann.city || (h?h.city:'—'),
      _propCountry: ann.country || (h?h.country:'—'),
      _propEmoji: ann.emoji || (h?h.emoji:'🏨'),

// Taux d'occupation = nuits réservées (confirmée/terminée) sur les 90 prochains
// jours, divisé par 90. Mesure la "remplissage" à venir du calendrier de l'hôte.
function computeOccupancyRate(resaList, windowDays){
  windowDays = windowDays || 90;
  const today = new Date(); today.setHours(0,0,0,0);
  const windowEnd = new Date(today); windowEnd.setDate(windowEnd.getDate()+windowDays);
  let bookedNights = 0;
  (resaList||[]).forEach(r=>{
    if(!r.check_in || !r.check_out) return;
    const ci = new Date(r.check_in), co = new Date(r.check_out);
    const start = ci > today ? ci : today;
    const end = co < windowEnd ? co : windowEnd;
    const nights = Math.max(0, Math.round((end-start)/86400000));
    bookedNights += nights;
  });
  return Math.min(100, Math.round(bookedNights / windowDays * 100));
}

function mapAnnonceRow(a, resaStats, viewStats){
  const h = hotels.find(x=>x.annonceId===a.id);
  const s = (resaStats && resaStats[a.id]) || {count:0, revenue:0, occupancy:0};
  const v = (viewStats && viewStats[a.id]) || 0;
  return {
    id: a.id,
    ref: a.ref,
    hotelId: h ? h.id : null,
    emoji: a.emoji || '🏠',
    name: a.name || 'Hébergement',
    address: a.address || '',
    city: a.city || '',
    country: a.country || 'Tunisie',
    typeLabel: a.type_label || a.type || 'Hébergement',
    stars: a.stars || 3,
    rooms: a.rooms || 1,
    bathrooms: a.bathrooms || 1,
    capacity: a.capacity || 2,
    price_night: a.price_night || 0,
    status: a.status || 'en attente',
    photos: a.photos || [],
    discount: a.discount_percent || 0,
    promoExpiry: a.promo_expires_at || null,
    ownerId: a.user_id,
    createdAt: a.created_at || new Date().toISOString(),
    // Réservations, revenus et vues = vraies données Supabase.
    // Clics/occupation/note : pas encore de table dédiée, restent à 0.
    stats: {
      vues:v, clics:0, reservations:s.count, revenus:s.revenue, tauxOccupation:s.occupancy||0, noteMoyenne:0, avis:0,
      vuesMois: Array(12).fill(0), revenusMois: Array(12).fill(0)
    }
  };
}

async function loadMesAnnonces(container){
  if(!auth.currentUser){navigate('home');return;}

  const { data, error } = await _sb.from('annonces')
    .select('*')
    .eq('user_id', auth.currentUser.id)
    .order('created_at', {ascending:false});

  if(error){
    if(container){container.innerHTML = '<div style="padding:24px;color:red;">Erreur : '+error.message+'</div>';}
    return;
  }

  const annIds = (data||[]).map(a=>a.id);

  // Agrège les vraies réservations (confirmée + terminée) par annonce
  const resaStats = {};
  if(annIds.length){
    const { data: resaRows, error: resaErr } = await _sb.from('reservations')
      .select('logement_id,total,status,check_in,check_out')
      .in('logement_id', annIds)
      .in('status', ['confirmée','terminée']);
    if(resaErr){
      console.warn('Erreur chargement stats réservations:', resaErr.message);
    } else {
      const byAnnonce = {};
      (resaRows||[]).forEach(r=>{
        if(!resaStats[r.logement_id]) resaStats[r.logement_id] = {count:0, revenue:0, occupancy:0};
        resaStats[r.logement_id].count++;
        resaStats[r.logement_id].revenue += r.total||0;
        if(!byAnnonce[r.logement_id]) byAnnonce[r.logement_id] = [];
        byAnnonce[r.logement_id].push(r);
      });
      Object.keys(byAnnonce).forEach(id=>{
        resaStats[id].occupancy = computeOccupancyRate(byAnnonce[id]);
      });
    }
  }

  // Agrège les vraies vues par annonce
  const viewStats = {};
  if(annIds.length){
    const { data: viewRows, error: viewErr } = await _sb.from('annonce_views')
      .select('annonce_id')
      .in('annonce_id', annIds);
    if(viewErr){
      console.warn('Erreur chargement stats vues:', viewErr.message);
    } else {
      (viewRows||[]).forEach(v=>{ viewStats[v.annonce_id] = (viewStats[v.annonce_id]||0) + 1; });
    }
  }

  appState.myAnnonces = (data||[]).map(a=>mapAnnonceRow(a, resaStats, viewStats));
  const fresh = buildMesAnnonces();
  if(container && container.parentNode){ container.replaceWith(fresh); }
}

function buildMesAnnonces(){
  if(!auth.currentUser){navigate('home');return document.createElement('div');}
  const list=appState.myAnnonces;
  const statusColor={publiée:'#0d9e6e','en attente':'#e6a800',suspendue:'#cc0000',brouillon:'#6c757d'};
  const statusBg={publiée:'#e8f9f0','en attente':'#fff8e0',suspendue:'#fff0f0',brouillon:'#f1f3f5'};

  const totalVues=list.reduce((s,a)=>s+a.stats.vues,0);

async function toggleAnnonceStatus(id){
  const a=appState.myAnnonces.find(x=>x.id===id);
  if(!a)return;
  const newStatus = a.status==='publiée' ? 'suspendue' : 'publiée';
  const { error } = await _sb.from('annonces').update({status:newStatus}).eq('id', id);
  if(error){ showToast('Erreur : '+error.message,'var(--red)'); return; }
  showToast(newStatus==='suspendue'?'Annonce suspendue':'✅ Annonce republiée !', newStatus==='suspendue'?'var(--gray-700)':'var(--green)');
  navigate('mesannonces');
}

async function deleteAnnonce(id){
  if(!confirm('Supprimer définitivement cette annonce ?'))return;
  const { error } = await _sb.from('annonces').delete().eq('id', id);
  if(error){ showToast('Erreur : '+error.message,'var(--red)'); return; }
  showToast('Annonce supprimée','var(--red)');
  navigate('mesannonces');
}

async function loadAnnonceDetail(container){

    .select('*')
    .eq('logement_id', a.id)
    .order('created_at', {ascending:false})
    .limit(10);

      ? await _sb.from('profiles').select('id,first_name,last_name').in('id', guestIds)

        {icon:'🖱️',val:s.clics,label:'Clics',sub:`Taux ${s.vues>0?Math.round(s.clics/s.vues*100):0}%`,color:'#8e44ad'},
        {icon:'📅',val:s.reservations,label:'Réservations',sub:'Confirmées',color:'var(--green)'},
        {icon:'💶',val:s.revenus.toLocaleString()+'€',label:'Revenus',sub:'Hors frais',color:'#c0392b'},
        {icon:'📊',val:s.tauxOccupation+'%',label:'Taux occupation',sub:'Nuits réservées',color:'#e67e22'},
        {icon:'⭐',val:s.noteMoyenne>0?s.noteMoyenne+'/5':'—',label:'Note moyenne',sub:s.avis+' avis',color:'#f39c12'},
      ].map(k=>`<div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:16px;">
        <div style="font-size:22px;margin-bottom:8px;">${k.icon}</div>
        <div style="font-size:22px;font-weight:800;color:${k.color};">${k.val}</div>
        <div style="font-size:13px;font-weight:600;color:var(--gray-700);margin-top:2px;">${k.label}</div>
        <div style="font-size:11px;color:var(--gray-400);margin-top:2px;">${k.sub}</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">

      <!-- Chart vues -->
