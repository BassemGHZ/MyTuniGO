        <div style="font-size:15px;font-weight:700;margin-bottom:4px;">👁️ Vues par mois</div>
        <div style="font-size:12px;color:var(--gray-500);margin-bottom:16px;">12 derniers mois</div>
        <div style="display:flex;align-items:flex-end;gap:4px;height:100px;">
          ${s.vuesMois.map((v,i)=>`
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
              <div style="width:100%;background:${v===Math.max(...s.vuesMois)?'var(--blue)':'#b3d4f0'};border-radius:3px 3px 0 0;height:${Math.round(v/maxVues*90)+4}px;transition:height .3s;cursor:pointer;position:relative;" title="${v} vues en ${MOIS[i]}"></div>
              <div style="font-size:9px;color:var(--gray-400);">${MOIS[i]}</div>
            </div>`).join('')}

      <!-- Chart revenus -->
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;">
        <div style="font-size:15px;font-weight:700;margin-bottom:4px;">💶 Revenus par mois</div>
        <div style="font-size:12px;color:var(--gray-500);margin-bottom:16px;">12 derniers mois</div>

              <div style="width:100%;background:${v===Math.max(...s.revenusMois)?'#0d9e6e':'#9fe1cb'};border-radius:3px 3px 0 0;height:${Math.round(v/maxRev*90)+1}px;transition:height .3s;cursor:pointer;" title="${v}€ en ${MOIS[i]}"></div>
              <div style="font-size:9px;color:var(--gray-400);">${MOIS[i]}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Performance + conseils -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">

      <!-- Entonnoir conversion -->
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;">
        <div style="font-size:15px;font-weight:700;margin-bottom:16px;">🎯 Entonnoir de conversion</div>
        ${[
          {label:'Vues',val:s.vues,color:'var(--blue)',pct:100},
          {label:'Clics',val:s.clics,color:'#8e44ad',pct:s.vues>0?Math.round(s.clics/s.vues*100):0},

        ].map(f=>`<div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">

            <span style="color:var(--gray-500);">${f.val.toLocaleString()} <span style="color:${f.color};font-weight:700;">(${f.pct}%)</span></span>

            <div style="background:${f.color};height:100%;border-radius:20px;width:${f.pct}%;transition:width .5s;"></div>
          </div>
        </div>`).join('')}
      </div>

      <!-- Conseils amélioration -->
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;">
        <div style="font-size:15px;font-weight:700;margin-bottom:14px;">💡 Conseils pour améliorer</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${[
            {icon:'📸',tip:'Ajoutez plus de photos',desc:'Les annonces avec 10+ photos reçoivent 3× plus de clics.',ok:a.stats.clics>100},
            {icon:'💬',tip:'Répondez aux avis',desc:'Un taux de réponse élevé rassure les voyageurs.',ok:a.stats.avis>5},
            {icon:'🏷️',tip:'Vérifiez votre prix',desc:'Votre prix est compétitif sur ce marché.',ok:a.price_night<150},
            {icon:'📅',tip:'Mettez à jour le calendrier',desc:'Un calendrier à jour augmente votre taux de réservation.',ok:a.stats.tauxOccupation>40},
          ].map(c=>`<div style="display:flex;gap:10px;align-items:flex-start;">
            <span style="font-size:18px;flex-shrink:0;">${c.ok?'✅':c.icon}</span>
            <div>
              <div style="font-size:13px;font-weight:700;color:${c.ok?'var(--green)':'var(--gray-800)'};">${c.tip}</div>
              <div style="font-size:12px;color:var(--gray-500);">${c.desc}</div>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Dernières réservations liées -->
    <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px;">📅 Réservations récentes sur cette annonce</div>
      ${realReservations.length===0?`<div style="text-align:center;padding:24px;color:var(--gray-500);font-size:14px;">Aucune réservation encore reçue pour cette annonce.</div>`:`
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:14px;">
          <thead><tr style="background:var(--gray-50);border-bottom:1px solid var(--gray-200);">
            <th style="padding:10px 14px;text-align:left;font-weight:700;color:var(--gray-600);font-size:12px;text-transform:uppercase;">Voyageur</th>
            <th style="padding:10px 14px;text-align:left;font-weight:700;color:var(--gray-600);font-size:12px;text-transform:uppercase;">Arrivée</th>
            <th style="padding:10px 14px;text-align:left;font-weight:700;color:var(--gray-600);font-size:12px;text-transform:uppercase;">Départ</th>
            <th style="padding:10px 14px;text-align:left;font-weight:700;color:var(--gray-600);font-size:12px;text-transform:uppercase;">Montant</th>
            <th style="padding:10px 14px;text-align:left;font-weight:700;color:var(--gray-600);font-size:12px;text-transform:uppercase;">Statut</th>
          </tr></thead>
          <tbody>
            ${realReservations.map(r=>{
              const sColor={confirmée:'var(--green)','en attente':'#a07000',terminée:'var(--gray-600)',annulée:'var(--red)'};
              const sBg={confirmée:'#e8f9f0','en attente':'#fff8e0',terminée:'#f1f3f5',annulée:'#fff0f0'};
              return `<tr style="border-bottom:1px solid var(--gray-100);">
                <td style="padding:10px 14px;font-weight:600;">${r.guestName}</td>
                <td style="padding:10px 14px;color:var(--gray-600);">${r.checkIn?new Date(r.checkIn).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'—'}</td>
                <td style="padding:10px 14px;color:var(--gray-600);">${r.checkOut?new Date(r.checkOut).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'—'}</td>
                <td style="padding:10px 14px;font-weight:700;">${r.total}€</td>
                <td style="padding:10px 14px;"><span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:${sBg[r.status]||'#f1f3f5'};color:${sColor[r.status]||'var(--gray-600)'};">${r.status.toUpperCase()}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}
    </div>

  </div>`;
  if(container && container.parentNode){ container.replaceWith(d); }
  else { return d; }
}

          <button onclick="deleteAccount()" style="width:100%;background:#fff0f0;color:var(--red);padding:10px;border-radius:var(--r-md);font-size:14px;font-weight:700;border:1.5px solid #ffcccc;cursor:pointer;">🗑️ Supprimer mon compte</button>

  </div>`;
  return d;
}

function saveProfile(){
  const u = auth.currentUser;
  const first = document.getElementById('pf-first')?.value?.trim();
  const last  = document.getElementById('pf-last')?.value?.trim();
  if(!first||!last){showToast('⚠️ Prénom et nom obligatoires','var(--red)');return;}
  u.firstName = first;
  u.lastName  = last;
  u.phone     = document.getElementById('pf-phone')?.value?.trim()||u.phone;
  u.birthdate = document.getElementById('pf-birth')?.value||u.birthdate;
  u.country   = document.getElementById('pf-country')?.value||u.country;
  u.bio       = document.getElementById('pf-bio')?.value?.trim()||u.bio;
  // Update in users array
  const idx = auth.users.findIndex(x=>x.id===u.id);
  if(idx>=0) auth.users[idx] = {...auth.users[idx], ...u};
  appState.profilEditing = false;
  showToast('✅ Profil mis à jour !','var(--green)');
  navigate('profil');
  renderAuthArea();
}

function deleteAccount(){
  if(!confirm('Êtes-vous sûr ? Cette action est irréversible.')) return;
  auth.currentUser = null;
  appState.reservations = [];
  appState.favorites = [];
  appState.myAnnonces = [];
  showToast('Compte supprimé. À bientôt.','var(--gray-700)');
  navigate('home');
}

    excBtn.addEventListener('click', function(){ checkAuthAndGo('excursion-form'); });
    excHdr.appendChild(excBtn);
  }
  return d;
}

function refreshExcursions(){
  const wrap = document.querySelector('[data-exc-list]');
  if(wrap){ const n=buildExcursions(); wrap.parentNode.replaceChild(n,wrap); return; }
  navigate('excursions');
}

function updateExcTotal(price){
  const pax = parseInt(document.getElementById('exc-pax')?.value||1);
  const total = price * pax;
  const el = document.getElementById('exc-total-block');
  if(el) el.innerHTML = `
    <div style="display:flex;justify-content:space-between;font-size:14px;padding:3px 0;"><span>${price}€ × ${pax} personne${pax>1?'s':''}</span><span>${total}€</span></div>
    <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;padding-top:8px;border-top:2px solid var(--gray-200);margin-top:6px;"><span>Total</span><span>${total}€</span></div>`;
}

function buildExcBookingCalendar(e){
  const today=new Date();
  const year =appState.excBookCalYear  || today.getFullYear();
  const month=appState.excBookCalMonth !== null && appState.excBookCalMonth !== undefined ? appState.excBookCalMonth : today.getMonth();
  appState.excBookCalYear=year; appState.excBookCalMonth=month;
  const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const avail=e.availability||[];
  const firstDay=new Date(year,month,1).getDay();
  const offset=firstDay===0?6:firstDay-1;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayStr=today.toISOString().split('T')[0];
  const selectedDate=appState.excBookingDate||'';

  let cells='';
  for(let i=0;i<offset;i++) cells+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isAvail=avail.includes(ds);
    const isPast=ds<todayStr;
    const isSel=ds===selectedDate;
    cells+='<div data-excdate="'+ds+'" style="'
      +'text-align:center;padding:8px 2px;border-radius:8px;'
      +'cursor:'+(isAvail&&!isPast?'pointer':'default')+';'
      +'font-size:13px;font-weight:'+(isAvail?'700':'400')+';'
      +'background:'+(isSel?'var(--blue)':isAvail&&!isPast?'#e8f4ff':'transparent')+';'
      +'color:'+(isSel?'#fff':isAvail&&!isPast?'var(--blue)':isPast?'var(--gray-300)':'var(--gray-400)')+';'
      +'border:2px solid '+(isSel?'var(--blue)':isAvail&&!isPast?'#b3d4f0':'transparent')+';'
      +'opacity:'+(isPast?'.35':'1')+';transition:all .12s;'
      +'">'
      +(isAvail&&!isPast&&!isSel?'<div style="width:5px;height:5px;border-radius:50%;background:var(--blue);margin:0 auto 1px;"></div>':'')
      +d+'</div>';
  }

  return '<div style="padding:12px;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'
      +'<button data-excbokcalnav="-1" data-excid="'+e.id+'" style="background:none;border:1.5px solid var(--gray-200);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">‹</button>'
      +'<span style="font-size:14px;font-weight:700;color:var(--gray-900);">'+MONTHS[month]+' '+year+'</span>'
      +'<button data-excbokcalnav="1" data-excid="'+e.id+'"  style="background:none;border:1.5px solid var(--gray-200);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">›</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px;">'
      +['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>'<div style="text-align:center;font-size:10px;font-weight:700;color:var(--gray-400);padding:3px 0;">'+d+'</div>').join('')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;">'+cells+'</div>'
    +(avail.length>0?'<div style="font-size:11px;color:var(--gray-400);margin-top:8px;text-align:center;">🔵 Dates disponibles</div>':'')
    +'</div>';
}

function excBookCalNav(dir, excId){
  let m=(appState.excBookCalMonth||0)+dir;
  let y=appState.excBookCalYear||new Date().getFullYear();
  if(m>11){m=0;y++;} if(m<0){m=11;y--;}
  appState.excBookCalMonth=m; appState.excBookCalYear=y;
  navigate('excursion-detail',{selectedExcursionId:excId});
}

function excSelectDate(ds){
  const today=new Date().toISOString().split('T')[0];
  if(ds<today)return;
  appState.excBookingDate=ds;
  // Update hidden input and display
  const inp=document.getElementById('exc-date');
  if(inp)inp.value=ds;
  const disp=document.getElementById('exc-date-display');
  if(disp){disp.textContent='📅 '+ds;disp.style.color='var(--blue)';}
  // Re-render the calendar portion only
  const allExc=[...excursions,...(appState.myExcursions||[])];
  const e=allExc.find(x=>x.id===appState.selectedExcursionId);
  if(e&&e.availability&&e.availability.length>0){
    const calWrap=document.querySelector('#exc-book-cal');
    if(calWrap)calWrap.innerHTML=buildExcBookingCalendar(e);
    else navigate('excursion-detail',{selectedExcursionId:appState.selectedExcursionId});
  }
}

function bookExcursion(excId){
  if(!auth.currentUser){openModal('login');showToast('Connectez-vous pour réserver','var(--blue)');return;}

  // Get date — mandatory from calendar selection
  const date = appState.excBookingDate || (document.getElementById('exc-date') && document.getElementById('exc-date').value) || '';
  if(!date){
    showToast('⚠️ Veuillez sélectionner une date dans le calendrier','var(--red)');
    // Highlight the calendar
    const cal = document.getElementById('exc-book-cal');
    if(cal){ cal.style.border='2.5px solid var(--red)'; cal.style.borderRadius='var(--r-lg)'; setTimeout(()=>{cal.style.border='';},2500); }
    return;
  }

  // Get participants
  const paxEl = document.getElementById('exc-pax');
  const pax = parseInt((paxEl && paxEl.value) || 1);

  // Find excursion in all arrays
  const allExc = [...excursions, ...(appState.myExcursions||[])];
  const exc = allExc.find(x=>x.id===excId);
  if(!exc){showToast('Excursion introuvable','var(--red)');return;}

  const total = (exc.price||0) * pax;
  appState.pendingBooking = {
    type:'excursion', excId,
    title: exc.title||'Excursion',
    date, pax, total,
    emoji: exc.emoji||'✈️',
    city: exc.city||'', country: exc.country||''
  };
  navigate('payment');
}

function excToggleStatus(id){
  const e = appState.myExcursions.find(x=>x.id===id);
  if(!e) return;
  e.status = e.status==='suspendue' ? 'publiée' : 'suspendue';
  showToast(e.status==='publiée' ? '✅ Excursion republiée' : '⏸️ Excursion suspendue', 'var(--blue)');
  navigate('mesannonces');
}

function excDelete(id){
  if(!confirm('Supprimer cette excursion ?')) return;
  appState.myExcursions = appState.myExcursions.filter(x=>x.id!==id);
  showToast('🗑️ Excursion supprimée', 'var(--red)');
  navigate('mesannonces');
}

function excPromoFlash(id){
  const e = appState.myExcursions.find(x=>x.id===id);
  if(!e) return;
  const pct = prompt('Réduction flash (%) :', e.discount||'20');
  if(pct===null || pct==='' || isNaN(+pct)) return;
  const p = Math.max(0, Math.min(99, +pct));
  // Always calculate from the BASE price, never from the discounted price
  const base = e.basePrice || e.oldPrice || e.price;
  e.basePrice = base;  // lock the original price forever
  e.oldPrice  = base;
  e.discount  = p;
  e.price     = p > 0 ? Math.round(base * (1 - p/100)) : base;
  showToast('⚡ Promotion flash de '+p+'% appliquée sur le prix de base ('+base+'€) !', 'var(--orange)');
  navigate('mesannonces');
}

function toggleExcFavorite(excId){
  const key = 'exc-'+excId;
  if(!auth.currentUser){openModal('login');return;}
  if(appState.favorites.includes(key)){appState.favorites=appState.favorites.filter(x=>x!==key);showToast('Retiré des favoris','var(--gray-700)');}
  else{appState.favorites.push(key);showToast('❤️ Ajouté aux favoris !','#e74c3c');}
  navigate('excursion-detail');
}

/* ── Photo management ── */
function excUploadPhotos(input){
  const files = Array.from(input.files);
  const fd = appState.excursionFormData;
  if(!fd.photos) fd.photos = [];
  const remaining = 3 - fd.photos.length;
  if(remaining <= 0){ showToast('Maximum 3 photos atteint', 'var(--red)'); return; }
  files.slice(0, remaining).forEach(function(file){
    const reader = new FileReader();
    reader.onload = function(e){
      fd.photos.push(e.target.result);
      excRefresh();
    };
    reader.readAsDataURL(file);
  });
}

function excRemovePhoto(idx){
  const fd = appState.excursionFormData;
  if(!fd.photos) return;
  fd.photos.splice(idx, 1);

}

function excFormValidate(){
  const fd = appState.excursionFormData;
  const cur = appState.excursionFormPage||0;
  if(cur===0){
    if(!fd.category){showToast('⚠️ Choisissez une catégorie','var(--red)');return false;}
    if(!fd.title?.trim()){showToast('⚠️ Ajoutez un titre','var(--red)');return false;}
    if(!fd.city?.trim()){showToast('⚠️ Indiquez la ville','var(--red)');return false;}
    if(!fd.description?.trim()||fd.description.length<50){showToast('⚠️ Description trop courte (min 50 car.)','var(--red)');return false;}
  }
  if(cur===2){
    if(!fd.price||fd.price<1){showToast('⚠️ Indiquez un prix valide','var(--red)');return false;}
    if(!fd.availability||fd.availability.length===0){
      showToast('⚠️ Sélectionnez au moins une date dans le calendrier','var(--red)');
      // Highlight calendar
      setTimeout(function(){
        const cal=document.getElementById('exc-form-step');
        const calWrap=cal&&cal.querySelector('[style*="border:1.5px solid var(--gray-200)"]');
        if(calWrap){calWrap.style.border='2.5px solid var(--red)';setTimeout(()=>{calWrap.style.border='';},2500);}
      },50);
      return false;
    }
    if(!fd.firstname?.trim()||!fd.lastname?.trim()||!fd.email?.trim()){showToast('⚠️ Remplissez vos coordonnées','var(--red)');return false;}
  }
  return true;
}

/* ── Calendrier formulaire excursion ── */
function buildExcFormCalendar(fd){
  const today = new Date();
  const year  = appState.excCalYear  || today.getFullYear();
  const month = appState.excCalMonth !== null && appState.excCalMonth !== undefined ? appState.excCalMonth : today.getMonth();
  appState.excCalYear=year; appState.excCalMonth=month;
  const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const firstDay=new Date(year,month,1).getDay();
  const offset=firstDay===0?6:firstDay-1;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const selected=fd.availability||[];
  const todayStr=today.toISOString().split('T')[0];

  let cells='';
  for(let i=0;i<offset;i++) cells+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isPast=ds<todayStr;
    const isSel=selected.includes(ds);
    const isToday=ds===todayStr;
    cells+='<div data-excformdate="'+ds+'" style="'
      +'text-align:center;padding:8px 2px;border-radius:8px;cursor:'+(isPast?'default':'pointer')+';'
      +'font-size:13px;font-weight:'+(isSel?'800':'500')+';'
      +'background:'+(isSel?'var(--blue)':isToday?'#fff8ee':'transparent')+';'
      +'color:'+(isSel?'#fff':isPast?'var(--gray-300)':'var(--gray-800)')+';'
      +'border:2px solid '+(isToday&&!isSel?'var(--orange)':isSel?'var(--blue)':'transparent')+';'
      +'opacity:'+(isPast?'.4':'1')+';transition:all .12s;'
      +'">'+(isSel?'<div style="font-size:9px;color:rgba(255,255,255,.8);margin-bottom:-2px;">✓</div>':'')+d+'</div>';
  }

  return '<div style="padding:16px;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">'
      +'<button data-excformcalnav="-1" style="background:none;border:1.5px solid var(--gray-200);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">‹</button>'
      +'<span style="font-size:15px;font-weight:700;color:var(--gray-900);">'+MONTHS[month]+' '+year+'</span>'
      +'<button data-excformcalnav="1"  style="background:none;border:1.5px solid var(--gray-200);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">›</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;">'
      +['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>'<div style="text-align:center;font-size:11px;font-weight:700;color:var(--gray-400);padding:4px 0;">'+d+'</div>').join('')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">'+cells+'</div>'
    +'</div>';
}

function excFormCalNav(dir){
  let m=(appState.excCalMonth??new Date().getMonth())+dir;
  let y=appState.excCalYear??new Date().getFullYear();
  if(m>11){m=0;y++;} if(m<0){m=11;y--;}
  appState.excCalMonth=m; appState.excCalYear=y;
  excRefresh();
}

function excFormToggleDate(ds){
  const today=new Date().toISOString().split('T')[0];
  if(ds<today)return;
  const fd=appState.excursionFormData;
  if(!fd.availability)fd.availability=[];
  const idx=fd.availability.indexOf(ds);
  if(idx>=0)fd.availability.splice(idx,1);
  else fd.availability.push(ds);
  fd.availability.sort();
  excRefresh();
}

function excFormRemoveDate(ds){
  const fd=appState.excursionFormData;
  if(!fd.availability)return;
  fd.availability=fd.availability.filter(d=>d!==ds);
  excRefresh();
}

async function uploadExcursionPhotos(ref, photos){
  const urls = [];
  for(let i=0;i<photos.length;i++){
    const p = photos[i];
    try{
      const blob = await (await fetch(p.dataUrl)).blob();
      const extMatch = (p.name||'').match(/\.([a-zA-Z0-9]+)$/);
      const ext = extMatch ? extMatch[1].toLowerCase() : 'jpg';
      const path = ref+'/'+Date.now()+'_'+i+'.'+ext;
      const { error: upErr } = await _sb.storage.from('excursions-photos').upload(path, blob, { contentType: blob.type||'image/jpeg' });
      if(upErr){ console.warn('Upload photo excursion échoué:', upErr.message); continue; }
      const { data: pub } = _sb.storage.from('excursions-photos').getPublicUrl(path);
      if(pub?.publicUrl) urls.push(pub.publicUrl);
    } catch(e){ console.warn('Erreur upload photo excursion:', e.message); }
  }
  return urls;
}

function paySetMethod(m){
  appState.paymentData.method=m;
  const block=document.getElementById('pay-form-block');
  if(block) block.innerHTML=buildPayFormHTML(m,appState.paymentData,appState.pendingBooking?.total||0);
  ['card','paypal'].forEach(id=>{
    const el=document.getElementById('pm-'+id);
    if(!el) return;
    const active=id===m;
    el.style.borderColor=active?'var(--blue)':'var(--gray-200)';
    el.style.background=active?'rgba(0,53,128,.05)':'#fff';
    const lbl=el.querySelector('div:last-child');
    if(lbl&&lbl.style.borderRadius==='50%') lbl.style.display=active?'block':'none';
  });
}

function paySet(key,val){appState.paymentData[key]=val;}

function formatCardNumber(input){
  let v=input.value.replace(/\D/g,'').substring(0,16);
  input.value=v.replace(/(.{4})/g,'$1  ').trim();
  const icon=document.getElementById('card-brand-icon');
  if(!icon) return;
  if(v.startsWith('4')) icon.textContent='💙';
  else if(v.startsWith('5')) icon.textContent='🔴';
  else if(v.startsWith('3')) icon.textContent='🟢';
  else icon.textContent='💳';
}

function formatExpiry(input){
  let v=input.value.replace(/\D/g,'').substring(0,4);
  if(v.length>=2) v=v.substring(0,2)+' / '+v.substring(2);
  input.value=v;
}

function processPayment(){
  const pb=appState.pendingBooking;
  const pd=appState.paymentData;
  if(!pb) return;
  const method=pd.method||'card';
  if(method==='card'){
    if((pd.cardNumber||'').replace(/\s/g,'').length<16){showToast('⚠️ Numéro de carte invalide','var(--red)');return;}
    if(!(pd.cardName||'').trim()){showToast('⚠️ Nom sur la carte requis','var(--red)');return;}
    if((pd.expiry||'').length<7){showToast('⚠️ Date d\'expiration invalide','var(--red)');return;}
    if((pd.cvv||'').length<3){showToast('⚠️ CVV invalide','var(--red)');return;}
  } else if(method==='paypal'){
    if(!(pd.paypalEmail||'').includes('@')){showToast('⚠️ E-mail PayPal invalide','var(--red)');return;}
  }
  showPaymentProcessing(pb.total,method,()=>finalizeBooking(pb,method));
}

function showPaymentProcessing(total,method,onComplete){
  const methodLabels={card:'Carte bancaire',paypal:'PayPal'};
  const overlay=document.createElement('div');
  overlay.id='pay-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:var(--r-xl);padding:40px 36px;text-align:center;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <div id="pay-anim" style="font-size:52px;margin-bottom:16px;">🔒</div>
    <h3 style="font-size:20px;font-weight:800;margin-bottom:8px;" id="pay-status">Traitement en cours…</h3>
    <p style="font-size:14px;color:var(--gray-500);margin-bottom:20px;" id="pay-substatus">Connexion sécurisée</p>
    <div style="background:var(--gray-100);border-radius:20px;height:6px;overflow:hidden;">
      <div id="pay-bar" style="height:100%;background:var(--blue);border-radius:20px;width:0%;transition:width .4s;"></div>
    </div>
    <div style="margin-top:12px;font-size:13px;color:var(--gray-400);">${methodLabels[method]||method} · ${total}€</div>
  </div>`;
  document.body.appendChild(overlay);
  const steps=[[15,'🔒','Connexion sécurisée…','Chiffrement SSL 256 bits'],[35,'📡','Vérification 3D Secure…','Authentification en cours'],[60,'💳','Autorisation bancaire…','Communication avec votre banque'],[85,'✅','Validation du paiement…','Finalisation'],[100,'🎉','Paiement accepté !','Votre réservation est confirmée']];
  let i=0;
  const interval=setInterval(()=>{
    if(i>=steps.length){clearInterval(interval);setTimeout(()=>{overlay.remove();onComplete();},800);return;}
    const [pct,icon,status,sub]=steps[i];
    document.getElementById('pay-bar').style.width=pct+'%';
    document.getElementById('pay-anim').textContent=icon;
    document.getElementById('pay-status').textContent=status;
    document.getElementById('pay-substatus').textContent=sub;
    i++;
  },700);
}

function finalizeBooking(pb,method){
  const ref=(pb.type==='excursion'?'EXC':'SF')+'-'+Math.random().toString(36).substr(2,8).toUpperCase();
  const methodLabels={card:'Carte bancaire',paypal:'PayPal'};
  if(pb.type==='hotel'){
    const h=hotels.find(x=>x.id===pb.hotelId)||{name:'Hébergement',emoji:'🏨',city:'—',country:'—'};
    const comm=calcCommission(pb.total);
    appState.reservations.unshift({id:ref,hotelId:pb.hotelId,name:pb.name,email:pb.email,
      total:pb.total, commission:comm.commission, netToHost:comm.netToHost,
      checkIn:pb.checkIn||'',checkOut:pb.checkOut||'',rooms:pb.rooms||1,nights:pb.nights||1,
      status:'confirmée',paymentMethod:methodLabels[method]||method,
      createdAt:new Date().toISOString().split('T')[0]});
    appState.confirmedBooking={hotel:h,name:pb.name,email:pb.email,total:pb.total,
      commission:comm.commission,netToHost:comm.netToHost,
      checkIn:pb.checkIn,checkOut:pb.checkOut,rooms:pb.rooms,ref,paymentMethod:methodLabels[method]};
    appState.pendingBooking=null;
    navigate('confirm');
  } else {
    appState.excursionBookings.push({id:ref,excId:pb.excId,title:pb.title,date:pb.date,pax:pb.pax,total:pb.total,status:'confirmée',paymentMethod:methodLabels[method]||method,createdAt:new Date().toISOString().split('T')[0]});
    appState.pendingBooking=null;
    showPaymentSuccess(ref,pb.title,pb.total,methodLabels[method]||method);
  }
}

/* ── Host on detail page ── */
function getHostForHotel(hId){
  const h = hotels.find(x=>x.id===hId);
  if(h && h.annonceId){
    return {
      id: 'HOST-'+h.annonceId,
      authId: h.userId || null,
      firstName: h.contactFirstname || 'Hôte',
      lastName: h.contactLastname || '',
      email: h.contactEmail || '',
      phone: h.contactPhone || '',
      avatar: (h.contactFirstname?.[0]||'H')+(h.contactLastname?.[0]||''),
      superhost: false,
      badges: ['verified'],
      rating: 0,
      reviews: 0,
      totalStays: 0,
      responseRate: 0,
      responseTime: '—',
      memberSince: new Date().toISOString(),
      bio: '',
      languages: ['Français'],
      city: h.city || '',
      country: h.country || '',
      properties: [hId]
    };
  }
  return hostsData.find(x=>x.properties.includes(hId)) || hostsData[0];
}

async function openConversationWithGuest(annonceId, guestId){
  if(!auth.currentUser){openModal('login');return;}
  try{
    const { data: existing, error: findErr } = await _sb.from('conversations')
      .select('*')
      .eq('logement_id', annonceId)
      .or(`participant_a.eq.${guestId},participant_b.eq.${guestId}`)
      .maybeSingle();
    if(findErr) throw findErr;

    let conv = existing;
    if(!conv){
      const { data: created, error: createErr } = await _sb.from('conversations').insert([{
        logement_id: annonceId,
        participant_a: auth.currentUser.id,
        participant_b: guestId
      }]).select().single();
      if(createErr) throw createErr;
      conv = created;
    }
    appState.selectedConvId = conv.id;
    navigate('conversation');
  } catch(e){
    console.error('openConversationWithGuest error:', e.message);
    showToast("Impossible d'ouvrir la conversation.",'var(--red)');
  }
}

async function openMessageHost(hId){
  if(!auth.currentUser){openModal('login');return;}
  const h = hotels.find(x=>x.id===hId);
  const host = getHostForHotel(hId);

  if(!h?.annonceId){
    showToast('La messagerie est disponible uniquement pour les annonces publiées.','var(--red)');
    return;
  }
  if(host.authId && auth.currentUser.id === host.authId){
    showToast('Vous ne pouvez pas vous contacter vous-même.','var(--red)');
    return;
  }
  if(!host.authId){
    showToast("Cet hôte n'a pas encore de compte MyTunigo actif.",'var(--red)');
    return;
  }

  try{
    // Chercher une conversation existante entre ce client et cette annonce
    const { data: existing, error: findErr } = await _sb.from('conversations')
      .select('*')
      .eq('logement_id', h.annonceId)
      .or(`participant_a.eq.${auth.currentUser.id},participant_b.eq.${auth.currentUser.id}`)
      .maybeSingle();
    if(findErr) throw findErr;

    let conv = existing;
    if(!conv){
      const { data: created, error: createErr } = await _sb.from('conversations').insert([{
        logement_id: h.annonceId,
        participant_a: auth.currentUser.id,
        participant_b: host.authId
      }]).select().single();
      if(createErr) throw createErr;
      conv = created;
    }

    appState.selectedConvId = conv.id;
    navigate('conversation');
  } catch(e){
    console.error('openMessageHost error:', e.message);
    showToast("Impossible d'ouvrir la conversation.",'var(--red)');
  }
}

async function sendMessage(convId){
  const input = document.getElementById('msg-input');
  const text = input?.value?.trim();
  if(!text) return;
  const btn = document.getElementById('msg-send-btn');
  if(btn){btn.disabled=true;}

  const uid = auth.currentUser?.id;
  const { data: conv, error: convErr } = await _sb.from('conversations').select('*').eq('id', convId).maybeSingle();
  if(convErr || !conv){ if(btn)btn.disabled=false; return; }

  const { error: insertErr } = await _sb.from('messages').insert([{
    conversation_id: convId,
    sender_id: uid,
    content: text
  }]);

  if(insertErr){
    console.error('sendMessage error:', insertErr.message);
    showToast("Le message n'a pas pu être envoyé.",'var(--red)');
    if(btn)btn.disabled=false;
    return;
  }

  // Notifier le destinataire par email via l'Edge Function
  try{
    const otherId = conv.participant_a===uid ? conv.participant_b : conv.participant_a;
    const [{data: otherProf}, {data: myProf}, {data: ann}] = await Promise.all([
      _sb.from('profiles').select('email').eq('id', otherId).maybeSingle(),
      _sb.from('profiles').select('first_name,last_name').eq('id', uid).maybeSingle(),
      _sb.from('annonces').select('name').eq('id', conv.logement_id).maybeSingle()
    ]);
    const senderName = myProf ? (myProf.first_name||'Un utilisateur') : 'Un utilisateur';

    if(otherProf?.email){
      await fetch('https://fxbetakueqkzipsqvtck.supabase.co/functions/v1/notify-message', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4YmV0YWt1ZXFremlwc3F2dGNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDk1MjAsImV4cCI6MjA5ODEyNTUyMH0.e3RRfDjfmH4EJjRiX2UDJhyNKzhWhiHYay8wJFoQYNk'
        },
        body: JSON.stringify({
          conversation_id: convId,
          recipient_email: otherProf.email,
          sender_name: senderName,
          property_name: ann?.name || '',
          message_text: text
        })
      });
    }
  } catch(efErr){
    console.error('notify-message Edge Function error:', efErr.message);
  }

  input.value = '';
  navigate('conversation');
}

function decideBookingRequest(reqId, decision){
  const label = decision==='confirmée' ? 'accepter' : 'refuser';
  const reason = prompt('Message optionnel pour le client (laissez vide pour le message standard) :', '');
  if(reason === null) return; // l'hôte a annulé la boîte de dialogue, aucune action
  handleBookingRequest(reqId, decision, reason.trim());
}

async function handleBookingRequest(reqId, decision, hostMessage){
  const { data: resa, error: fetchErr } = await _sb.from('reservations').select('*').eq('id', reqId).maybeSingle();
  if(fetchErr || !resa){ showToast('Demande introuvable','var(--red)'); return; }

  const { error } = await _sb.from('reservations').update({status: decision}).eq('id', reqId);
  if(error){ showToast('Erreur : '+error.message,'var(--red)'); return; }

  showToast(decision==='confirmée' ? '✅ Demande acceptée ! Réservation confirmée.' : 'Demande refusée.', decision==='confirmée'?'var(--green)':'var(--gray-700)');

  // Email de décision au client
  try{
    const [{data: guestProf}, {data: ann}] = await Promise.all([
      _sb.from('profiles').select('email,first_name,last_name').eq('id', resa.guest_id).maybeSingle(),
      _sb.from('annonces').select('name').eq('id', resa.logement_id).maybeSingle()
    ]);
    if(guestProf?.email){
      await fetch('https://fxbetakueqkzipsqvtck.supabase.co/functions/v1/notify-booking', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4YmV0YWt1ZXFremlwc3F2dGNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDk1MjAsImV4cCI6MjA5ODEyNTUyMH0.e3RRfDjfmH4EJjRiX2UDJhyNKzhWhiHYay8wJFoQYNk'
        },
        body: JSON.stringify({
          type: 'decision',
          decision: decision==='confirmée' ? 'accepted' : 'declined',
          recipient_email: guestProf.email,
          guest_name: guestProf.first_name || 'Voyageur',
          property_name: ann?.name || 'Hébergement',
          check_in: resa.check_in, check_out: resa.check_out,
          guests_count: resa.guests_count, total: resa.total,
          host_message: hostMessage || ''
        })
      });
    }
  } catch(efErr){
    console.error('notify-booking decision error:', efErr.message);
  }

  navigate('booking-requests');
}

        (promoRows||[]).forEach(r=>{ _hostCalPromoMap[r.date] = r.discount_percent; });

function renderCalGrid(year, month, cal, today, firstDay, daysInMonth){
  const grid = document.getElementById('cal-grid');
  if(!grid) return;
  grid.innerHTML = '';

  // Empty cells before first day
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  for(let i=0; i<offset; i++){
    const empty = document.createElement('div');
    grid.appendChild(empty);
  }

  // Day cells
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = year+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isReserved = _hostCalReservedSet.has(dateStr);
    const isBlocked = cal.blocked.includes(dateStr);
    const isToday   = dateStr === today;
    const isPast    = dateStr < today;
    const price     = cal.priceOverrides[dateStr];
    const promoPct  = _hostCalPromoMap[dateStr];
    const isSelected = _calMode==='promo' && _calPromoSelection.has(dateStr);
    const clickable = !isPast && !isReserved && (_calMode==='block' || !isBlocked);

    const cell = document.createElement('div');
    let bg, color, border;
    if(isPast){ bg='var(--gray-100)'; color='var(--gray-300)'; border='1px solid var(--gray-100)'; }
    else if(isReserved){ bg='var(--red)'; color='#fff'; border='1px solid var(--red)'; }
    else if(isBlocked){ bg='var(--gray-400)'; color='#fff'; border='1px solid var(--gray-400)'; }
    else if(promoPct){ bg='#ea580c'; color='#fff'; border='1px solid #ea580c'; }
    else { bg='#e8f9f0'; color='var(--gray-900)'; border='1px solid #6bcf9e'; }

    cell.style.cssText =
      'text-align:center;padding:10px 4px;border-radius:6px;font-size:13px;font-weight:'+(isToday?'800':'400')+
      ';transition:background .15s,transform .1s;'+
      'background:'+bg+';color:'+color+';'+
      'border:'+(isToday?'2px solid var(--blue)':border)+';'+
      'box-shadow:'+(isSelected?'inset 0 0 0 3px var(--blue)':'none')+';'+
      'cursor:'+(clickable?'pointer':'not-allowed')+';';

    cell.textContent = day;
    if(isBlocked) cell.classList.add('cal-blocked');
    if(isReserved) cell.classList.add('cal-reserved');
    cell.dataset.date = dateStr;

    if(promoPct){
      const pctEl = document.createElement('div');
      pctEl.style.cssText = 'font-size:9px;color:#fff;font-weight:800;margin-top:1px;';
      pctEl.textContent = '-'+promoPct+'%';
      cell.appendChild(pctEl);
    } else if(price){
      const priceEl = document.createElement('div');
      priceEl.style.cssText = 'font-size:9px;color:'+((isBlocked||isReserved)?'#fff':'var(--blue)')+';font-weight:700;margin-top:2px;';
      priceEl.textContent = price+'€';
      cell.appendChild(priceEl);
    }

    if(clickable){
      cell.addEventListener('click', function(){
        if(_calMode==='promo') togglePromoSelection(this.dataset.date);
        else toggleBlockDay(this.dataset.date);
      });
      if(_calMode==='block'){
        cell.addEventListener('mouseenter', function(){
          if(!this.classList.contains('cal-blocked'))
            this.style.background='#c8f0d8';
        });
        cell.addEventListener('mouseleave', function(){
          if(!this.classList.contains('cal-blocked'))
            this.style.background=promoPct?'#ea580c':'#e8f9f0';
        });
      }
    } else if(isReserved){
      cell.title = 'Date réservée — non modifiable';
    } else if(isBlocked && _calMode==='promo'){
      cell.title = 'Date bloquée — débloquez-la avant d\'y appliquer une promotion';
    }

    grid.appendChild(cell);
  }
}

function updateCalStats(cal, daysInMonth){
  const el = document.getElementById('cal-stats');
  if(!el) return;
  const blocked = cal.blocked.length;
  const avail   = daysInMonth - blocked;
  const rate    = Math.round(avail/daysInMonth*100);
  el.innerHTML = [
    {label:'Nuits disponibles', val:avail,     color:'var(--green)'},
    {label:'Nuits bloquées',    val:blocked,   color:'var(--red)'},
    {label:'Taux disponibilité',val:rate+'%',  color:'var(--blue)'},
  ].map(s=>'<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--gray-100);font-size:14px;">'
    +'<span style="color:var(--gray-600);">'+s.label+'</span>'
    +'<span style="font-weight:700;color:'+s.color+';">'+s.val+'</span></div>').join('');
}
function navCalendar(dir){
  let {year,month} = appState.calendarView;
  month += dir;
  if(month>12){month=1;year++;}
  if(month<1){month=12;year--;}
  appState.calendarView={year,month};
  // Update month label
  const cal = getCalForAnnonce(appState.selectedAnnonceId || (appState.myAnnonces[0] && appState.myAnnonces[0].id) || 'ANN-K7L8M9N0');
  const firstDay = new Date(year,month-1,1).getDay();
  const daysInMonth = new Date(year,month,0).getDate();
  const today = new Date().toISOString().split('T')[0];
  const monthName = new Date(year,month-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  // Update label
  const labels = document.querySelectorAll('.cal-month-label');
  labels.forEach(el=>{ el.textContent = monthName; el.style.textTransform='capitalize'; });
  // Re-render grid
  renderCalGrid(year, month, cal, today, firstDay, daysInMonth);
  updateCalStats(cal, daysInMonth);
  // Fallback: if label not found, full re-render
  if(!document.getElementById('cal-grid')) navigate('host-calendar');
}

// Rafraîchit uniquement la grille du calendrier + la barre de sélection,
// sans reconstruire toute la page (en-tête, pied de page...) — évite tout
// effet de clignotement/pliage lors d'un simple clic sur une date.
function refreshHostCalendarLight(){
  const {year,month} = appState.calendarView;
  const cal = getCalForAnnonce(_hostCalAnnonceId || 'ANN-K7L8M9N0');
  const firstDay = new Date(year,month-1,1).getDay();
  const daysInMonth = new Date(year,month,0).getDate();
  const today = new Date().toISOString().split('T')[0];
  renderCalGrid(year, month, cal, today, firstDay, daysInMonth);
  updateCalStats(cal, daysInMonth);
  const bar = document.getElementById('promo-selection-bar');
  if(bar) bar.textContent = _calPromoSelection.size+' date(s) sélectionnée(s)';
  const applyBtn = document.getElementById('promo-apply-btn');
  if(applyBtn){
    applyBtn.disabled = _calPromoSelection.size===0;
    applyBtn.style.opacity = _calPromoSelection.size===0 ? '.5' : '1';
  }
}

function setCalMode(mode){
  _calMode = mode;
  _calPromoSelection = new Set();
  _calPromoRangeStart = null;
  render();
}

let _calPromoRangeStart = null;

function togglePromoSelection(dateStr){
  if(!_calPromoRangeStart){
    // Premier clic : démarre une nouvelle sélection à cette date
    _calPromoRangeStart = dateStr;
    _calPromoSelection = new Set([dateStr]);
  } else {
    const start = _calPromoRangeStart;
    if(dateStr === start){
      // Reclic sur la même date : confirme cette date seule et referme la sélection
      _calPromoRangeStart = null;
    } else {
      // Deuxième clic : sélectionne toute la plage entre les deux dates
      const from = start < dateStr ? start : dateStr;
      const to   = start < dateStr ? dateStr : start;
      const cal = getCalForAnnonce(_hostCalAnnonceId || 'ANN-K7L8M9N0');
      const sel = new Set();
      let d = new Date(from);
      const end = new Date(to);
      while(d <= end){
        const ds = d.toISOString().split('T')[0];
        if(!_hostCalReservedSet.has(ds) && !cal.blocked.includes(ds)) sel.add(ds);
        d.setDate(d.getDate()+1);
      }
      _calPromoSelection = sel;
      _calPromoRangeStart = null; // prêt pour une nouvelle sélection au prochain clic
    }
  }
  refreshHostCalendarLight();
}

function cancelPromoSelection(){
  _calPromoSelection = new Set();
  _calPromoRangeStart = null;
  refreshHostCalendarLight();
}

async function applyDatePromo(){
  if(_calPromoSelection.size===0){ showToast('Sélectionnez au moins une date','var(--red)'); return; }
  const pct = parseInt(document.getElementById('promo-date-pct')?.value||0);
  const annId = appState.selectedAnnonceId || (appState.myAnnonces[0] && appState.myAnnonces[0].id);
  if(!annId){ showToast('Aucune annonce sélectionnée','var(--red)'); return; }
  const dates = [..._calPromoSelection];

  let action = '';
  if(pct<=0){
    const { error } = await _sb.from('date_discounts').delete().eq('annonce_id', annId).in('date', dates);
    if(error){ showToast('Erreur : '+error.message,'var(--red)'); return; }
    dates.forEach(d=>delete _hostCalPromoMap[d]);
    showToast('Promotion retirée sur '+dates.length+' date'+(dates.length>1?'s':''),'var(--gray-700)');
    action = 'removed';
  } else {
    if(pct>90){ showToast('Réduction maximum : 90%','var(--red)'); return; }
    const rows = dates.map(d=>({ annonce_id: annId, date: d, discount_percent: pct }));
    const { error } = await _sb.from('date_discounts').upsert(rows, { onConflict: 'annonce_id,date' });
    if(error){ showToast('Erreur : '+error.message,'var(--red)'); return; }
    dates.forEach(d=>_hostCalPromoMap[d]=pct);
    showToast('🏷️ Promotion -'+pct+'% appliquée sur '+dates.length+' date'+(dates.length>1?'s':''),'#ea580c');
    action = 'applied';
  }

  // On accumule le changement — l'email récapitulatif ne part qu'au clic sur "Enregistrer"
  _pendingPromoChanges.push({ dates: dates.sort(), discount_percent: pct, action });

  _calPromoSelection = new Set();
  _calPromoRangeStart = null;
  refreshHostCalendarLight();
}

function toggleBlockDay(dateStr){
  if(_hostCalReservedSet.has(dateStr)){
    showToast('⛔ Cette date est déjà réservée — impossible de la modifier.','var(--red)');
    return;
  }
  const cal = getCalForAnnonce(appState.selectedAnnonceId || (appState.myAnnonces[0] && appState.myAnnonces[0].id) || 'ANN-K7L8M9N0');
  const wasBlocked = cal.blocked.includes(dateStr);
  if(wasBlocked){
    cal.blocked = cal.blocked.filter(d=>d!==dateStr);
    showToast('📅 Disponible','var(--green)');
  } else {
    cal.blocked.push(dateStr);
    showToast('🔒 Bloqué','var(--gray-700)');
  }
  // Update cell style
  const cell = document.querySelector('[data-date="'+dateStr+'"]');
  if(cell){
    const nowBlocked = cal.blocked.includes(dateStr);
    cell.style.background = nowBlocked ? 'var(--gray-400)' : '#e8f9f0';
    cell.style.color = nowBlocked ? '#fff' : 'var(--gray-900)';
    cell.style.border = nowBlocked ? '1px solid var(--gray-400)' : '1px solid #6bcf9e';
    if(nowBlocked){ cell.classList.add('cal-blocked'); }
    else { cell.classList.remove('cal-blocked'); }
  }
  // Update stats
  const daysInMonth = new Date(appState.calendarView.year, appState.calendarView.month, 0).getDate();
  updateCalStats(cal, daysInMonth);
}

function validateReqDates(){
  const ciEl = document.getElementById('req-checkin');
  const coEl = document.getElementById('req-checkout');
  if(!ciEl||!coEl) return;
  const ci=ciEl.value, co=coEl.value;
  if(ci && co && co<=ci){
    const minCo=new Date(ci); minCo.setDate(minCo.getDate()+1);
    coEl.value=minCo.toISOString().split('T')[0];
    showToast('📅 Date de départ ajustée','var(--blue)');
  }
  if(ci) coEl.min=new Date(new Date(ci).getTime()+86400000).toISOString().split('T')[0];

function getBlockedDatesForHotel(hId){
  const ann = appState.myAnnonces.find(a=>a.hotelId===hId);
  if(!ann) return [];
  const cal = calendarData[ann.id];
  return cal ? cal.blocked : [];

async function loadReservedDatesForAnnonce(annonceId){
  if(!annonceId) return [];
  const { data, error } = await _sb.from('reservations_availability')
    .select('check_in,check_out')
    .eq('logement_id', annonceId);
  if(error){ console.error('loadReservedDatesForAnnonce error:', error.message); return []; }
  const days = new Set();
  (data||[]).forEach(r=>{
    if(!r.check_in || !r.check_out) return;
    let d = new Date(r.check_in);
    const end = new Date(r.check_out);
    while(d < end){
      days.add(d.toISOString().split('T')[0]);
      d.setDate(d.getDate()+1);
    }
  });
  return [...days];
}

function renderBookingMonth(year, month, unavailable, today){
  const monthNames=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const todayStr = today.toISOString().split('T')[0];
  const days = ['L','M','M','J','V','S','D'];
  const ci = appState.checkIn||'';
  const co = appState.checkOut||'';

  let html = '<div style="margin-bottom:10px;">';
  html += '<div style="font-size:12px;font-weight:700;text-align:center;margin-bottom:6px;color:var(--gray-700);">'
    + monthNames[month]+' '+year+'</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;">';
  days.forEach(d=>{
    html += '<div style="text-align:center;font-size:9px;font-weight:700;color:var(--gray-400);padding:2px 0;">'+d+'</div>';
  });
  for(let i=0;i<offset;i++) html+='<div></div>';
  for(let day=1;day<=daysInMonth;day++){
    const ds = year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isUnavail = unavailable.has(ds);
    const isPast = ds < todayStr;
    const isCi = ds===ci, isCo = ds===co;
    const inRange = ci && co && ds>ci && ds<co;
    const clickable = !isUnavail && !isPast;
    const promoPct = (appState._bkDatePromos||{})[ds];
    let bg='#e8f9f0', border='1px solid #6bcf9e', color='var(--gray-700)';
    if(isPast){ bg='#f5f5f5'; border='1px solid #eeeeee'; color='#cccccc'; }
    else if(isUnavail){ bg='#ffdddd'; border='1px solid #ffaaaa'; color='#cc0000'; }
    else if(promoPct){ bg='#fdead9'; border='1px solid #ea580c'; color='#ea580c'; }
    if(isCi||isCo){ bg='var(--blue)'; border='1px solid var(--blue)'; color='#fff'; }
    else if(inRange){ bg='#cce0ff'; border='1px solid #99c2ff'; color='var(--blue)'; }
    const fw = ds===todayStr ? '800':'500';
    html += '<div '+(clickable?`onclick="bkSelectDate('${ds}')" style="cursor:pointer;`:'style="cursor:not-allowed;')
      +'text-align:center;padding:5px 1px;font-size:11px;font-weight:'+fw+';background:'+bg+';color:'+color+';border:'+border+';border-radius:3px;transition:transform .1s;position:relative;"'
      +(clickable?' onmouseover="this.style.transform=\'scale(1.1)\'" onmouseout="this.style.transform=\'\'"':'')
      +'>'+(isUnavail&&!isCi&&!isCo?'<s>'+day+'</s>':day)
      +(promoPct&&!isCi&&!isCo?'<div style="font-size:6px;font-weight:800;line-height:1;">-'+promoPct+'%</div>':'')
      +'</div>';
  }
  html += '</div></div>';
  return html;
}

function bkSelectDate(ds){
  const ciEl = document.getElementById('bk-ci');
  const coEl = document.getElementById('bk-co');
  if(!ciEl||!coEl) return;
  const ci = ciEl.value;
  const co = coEl.value;

  if(!ci || (ci && co)){
    // Démarre une nouvelle sélection
    ciEl.value = ds; coEl.value = '';
    appState.checkIn = ds; appState.checkOut = '';
  } else if(ds <= ci){
    // Clique une date antérieure ou égale à l'arrivée -> redémarre depuis cette date
    ciEl.value = ds; coEl.value = '';
    appState.checkIn = ds; appState.checkOut = '';
  } else {
    // Vérifie qu'aucune date indisponible ne se trouve dans l'intervalle choisi
    const unavailable = appState._bkUnavailable || new Set();
    let conflict = false;
    let d = new Date(ci); d.setDate(d.getDate()+1);
    const end = new Date(ds);
    while(d < end){
      if(unavailable.has(d.toISOString().split('T')[0])){ conflict = true; break; }
      d.setDate(d.getDate()+1);
    }
    if(conflict){
      showToast('⛔ Votre séjour engloberait des dates indisponibles. Choisissez une autre date de départ.','var(--red)');
      return;
    }
    coEl.value = ds;
    appState.checkOut = ds;
  }
  updateBk();
  if(appState._bkRefreshCal) appState._bkRefreshCal();
}

function validateDateAgainstBlocked(hId){
  const blocked = (appState._bkUnavailable && appState._bkHotelId===hId) ? [...appState._bkUnavailable] : getBlockedDatesForHotel(hId);
  if(!blocked.length) return;
  const ci = document.getElementById('bk-ci')?.value;
  const co = document.getElementById('bk-co')?.value;
  const warnEl = document.getElementById('bk-avail-warn');

  if(ci && blocked.includes(ci)){
    showToast('⛔ La date d\'arrivée est indisponible','var(--red)');
    if(warnEl) warnEl.style.display='flex';
    return;
  }
  if(co && blocked.includes(co)){
    showToast('⛔ La date de départ est indisponible','var(--red)');
    if(warnEl) warnEl.style.display='flex';
    return;
  }
  if(ci && co){
    const start = new Date(ci), end = new Date(co);
    for(let d=new Date(start); d<end; d.setDate(d.getDate()+1)){
      const ds = d.toISOString().split('T')[0];
      if(blocked.includes(ds)){
        if(warnEl) warnEl.style.display='flex';
        return;
      }
    }
    if(warnEl) warnEl.style.display='none';
  }
}

    const w=120,h=40,pad=4;

    const range=max-min||1;
    const pts=data.map((v,i)=>{
      const x=pad+i*(w-2*pad)/(data.length-1);
      const y=h-pad-(v-min)/range*(h-2*pad);
      return x+','+y;
    }).join(' ');
    const first=pts.split(' ')[0], last=pts.split(' ').slice(-1)[0];
    const lx=parseFloat(last.split(',')[0]),ly=parseFloat(last.split(',')[1]);
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">

  const d = new Date(dateStr);
  if(isNaN(d.getTime())) return '—';
  const pad = n => String(n).padStart(2,'0');
  return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());

async function saveAdminAnnonceEdit(id){
  const val = fid => document.getElementById(fid)?.value;
  const updates = {
    name: val('am-name'),
    price_night: parseFloat(val('am-price-night'))||0,
    city: val('am-city'),
    country: val('am-country'),
    address: val('am-address'),
    zip: val('am-zip'),
    size: parseFloat(val('am-size'))||null,
    access: val('am-access'),
    rooms: parseInt(val('am-rooms'))||1,
    bathrooms: parseInt(val('am-bathrooms'))||1,
    capacity: parseInt(val('am-capacity'))||1,
    stars: parseInt(val('am-stars'))||0,
    checkin: val('am-checkin'),
    checkout: val('am-checkout'),
    min_stay: parseInt(val('am-min-stay'))||1,
    max_stay: parseInt(val('am-max-stay'))||30,
    contact_firstname: val('am-contact-firstname'),
    contact_lastname: val('am-contact-lastname'),
    contact_email: val('am-contact-email'),
    contact_phone: val('am-contact-phone'),
    description: val('am-desc')
  };

  const { error } = await _sb.from('annonces').update(updates).eq('id', id);
  if(error){ showToast('Erreur : '+error.message,'var(--red)'); return; }

  showToast('✅ Annonce mise à jour','var(--green)');
  _adminModalEditMode = false;
  document.getElementById('modal-root').innerHTML = '';
  buildAdminAnnonces(document.getElementById('admin-content'));
}

async function rejectExcursion(id, ref, title, email, firstname){

async function saveAdminExcursionEdit(id){
  const val = fid => document.getElementById(fid)?.value;
  const updates = {
    title: val('ae-title'),
    price: parseFloat(val('ae-price'))||0,
    city: val('ae-city'),
    country: val('ae-country'),
    duration: val('ae-duration'),
    max_participants: parseInt(val('ae-max-participants'))||1,
    min_age: parseInt(val('ae-min-age'))||0,
    meeting_point: val('ae-meeting-point'),
    meeting_time: val('ae-meeting-time'),
    meeting_time_end: val('ae-meeting-time-end'),
    contact_firstname: val('ae-contact-firstname'),
    contact_lastname: val('ae-contact-lastname'),
    contact_email: val('ae-contact-email'),
    contact_phone: val('ae-contact-phone'),
    description: val('ae-desc')
  };

  const { error } = await _sb.from('excursions').update(updates).eq('id', id);
  if(error){ showToast('Erreur : '+error.message,'var(--red)'); return; }

  showToast('✅ Excursion mise à jour','var(--green)');
  _adminModalEditMode = false;
  document.getElementById('modal-root').innerHTML = '';
  buildAdminExcursions(document.getElementById('admin-content'));
}

/* ===================== MOBILE NAV ===================== */
function buildMobileNav(){
  if(window.innerWidth > 768) return '';
  const u = auth.currentUser;
  const pg = appState.page;
  const unreadMsgs = 0; // TODO: brancher sur un vrai compteur "messages non lus" Supabase (colonne read)

  const items = [
    {icon:'🏠', label:'Accueil',   page:'home'},
    {icon:'🔍', label:'Logements', page:'results'},
    {icon:'✈️', label:'Excursions',page:'excursions'},
    {icon:'💬', label:'Messages',  page:'messages', badge:unreadMsgs},
    {icon:u?'👤':'🔑', label:u?'Profil':'Connexion', page:u?'profil':'login'},
  ];

  return '<nav id="mobile-bottom-nav" style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--gray-200);z-index:200;display:flex;box-shadow:0 -4px 16px rgba(30,45,78,.10);padding-bottom:env(safe-area-inset-bottom,0);">'
    + items.map(item=>{
        const active = item.page === pg || (item.page==='profil' && pg==='profil');
        const onclick = item.page==='login' ? "openModal('login')" : "navigate('"+item.page+"')";
        return '<button onclick="'+onclick+'"'
          +' style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;font-size:10px;font-weight:'+(active?'700':'500')+';color:'+(active?'var(--blue)':'var(--gray-400)')+';border:none;background:none;cursor:pointer;gap:3px;position:relative;min-height:52px;">'
          // Active indicator top bar
          +(active?'<span style="position:absolute;top:0;left:20%;right:20%;height:2.5px;background:var(--blue);border-radius:0 0 3px 3px;"></span>':'')
          // Badge
          +(item.badge?'<span style="position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:20px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;">'+item.badge+'</span>':'')
          +'<span style="font-size:21px;line-height:1;">'+item.icon+'</span>'
          +'<span>'+item.label+'</span>'
          +'</button>';
      }).join('')
    + '</nav>';
}


/* ── Shared page wrapper ── */
function infoPage(title, subtitle, sections){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'max-width:900px;margin:0 auto;padding:48px 20px 80px;';

  // Breadcrumb
  const bc = document.createElement('div');
  bc.style.cssText = 'font-size:13px;color:var(--gray-500);margin-bottom:32px;display:flex;align-items:center;gap:6px;';
  bc.innerHTML = '<span onclick="navigate(\'home\')" style="cursor:pointer;color:var(--blue-l);font-weight:600;">Accueil</span>'
    +' <span>›</span> <span>'+title+'</span>';
  wrap.appendChild(bc);

  // Hero
  const hero = document.createElement('div');
  hero.style.cssText = 'margin-bottom:48px;';
  hero.innerHTML = '<h1 style="font-size:36px;font-weight:900;color:var(--blue);margin-bottom:12px;line-height:1.1;">'+title+'</h1>'
    +'<p style="font-size:18px;color:var(--gray-500);line-height:1.7;">'+subtitle+'</p>';
  wrap.appendChild(hero);

  // Sections
  sections.forEach(sec => {
    const s = document.createElement('div');
    s.style.cssText = 'margin-bottom:40px;';
    s.innerHTML = (sec.title?'<h2 style="font-size:22px;font-weight:800;color:var(--blue);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--gray-200);">'+sec.title+'</h2>':'')

    wrap.appendChild(s);
  });

  return wrap;
}

/* ===================== iCAL SYNC ===================== */

function copyIcalUrl(){
  const annId = appState.selectedAnnonceId || 'ANN-K7L8M9N0';
  const url = 'https://mytunigo.com/calendar/ical/'+annId+'.ics';
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>showToast('📋 URL iCal copiée !','var(--green)'));
  } else {
    // Fallback
    const el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('📋 URL iCal copiée !','var(--green)');
  }
}

function saveIcalUrl(platform, url){
  const annId = appState.selectedAnnonceId || 'ANN-K7L8M9N0';
  const ann = appState.myAnnonces.find(a=>a.id===annId);
  if(ann){
    if(!ann.icalUrls) ann.icalUrls = {};
    ann.icalUrls[platform] = url;
  }
}

function syncIcal(platform){
  const annId = appState.selectedAnnonceId || 'ANN-K7L8M9N0';
  const ann = appState.myAnnonces.find(a=>a.id===annId);
  const url = ann?.icalUrls?.[platform] || document.getElementById('ical-'+platform)?.value;

  if(!url || url.trim() === ''){
    showToast('⚠️ Collez d\'abord l\'URL iCal','var(--red)');
    return;
  }
  if(!url.includes('.ics') && !url.includes('ical') && !url.includes('calendar')){
    showToast('⚠️ URL iCal invalide — elle doit contenir .ics','var(--red)');
    return;
  }

  // Save URL
  saveIcalUrl(platform, url);

  // Simulate sync (in production: fetch the .ics file and parse VEVENT dates)
  const statusEl = document.getElementById('ical-status');
  if(statusEl){ statusEl.style.display='block'; statusEl.style.color='var(--blue)'; statusEl.textContent='⏳ Synchronisation '+platform+' en cours...'; }

  setTimeout(()=>{
    // Simulate finding 3 blocked dates from the external calendar
    const cal = getCalForAnnonce(annId);
    const today = new Date();
    const simulatedDates = [0,1,2].map(i=>{
      const d = new Date(today);
      d.setDate(d.getDate() + 30 + i);
      return d.toISOString().split('T')[0];
    });
    simulatedDates.forEach(dt=>{
      if(!cal.blocked.includes(dt)) cal.blocked.push(dt);
    });

    if(statusEl){
      statusEl.style.color='var(--green)';
      statusEl.textContent='✅ '+platform+' synchronisé — '+simulatedDates.length+' date(s) importée(s) et bloquée(s)';
    }
    showToast('✅ '+platform+' synchronisé avec succès !','var(--green)');

    // Refresh calendar grid
    setTimeout(()=>{ if(typeof renderCalGrid==='function') renderCalGrid(); }, 300);
  }, 1500);
}

function syncAllIcal(){
  const annId = appState.selectedAnnonceId || 'ANN-K7L8M9N0';
  const ann = appState.myAnnonces.find(a=>a.id===annId);
  const platforms = ['airbnb','booking','vrbo','autre'];
  const active = platforms.filter(p=> ann?.icalUrls?.[p] || document.getElementById('ical-'+p)?.value);

  if(active.length === 0){
    showToast('⚠️ Aucune URL iCal configurée','var(--red)'); return;
  }

  const statusEl = document.getElementById('ical-status');
  if(statusEl){ statusEl.style.display='block'; statusEl.style.color='var(--blue)'; statusEl.textContent='⏳ Synchronisation de '+active.length+' plateforme(s)...'; }

  let done = 0;
  active.forEach(p=>{
    setTimeout(()=>{
      syncIcal(p);
      done++;
      if(done===active.length){
        if(statusEl){ statusEl.style.color='var(--green)'; statusEl.textContent='✅ '+active.length+' plateforme(s) synchronisée(s) avec succès !'; }
      }
    }, active.indexOf(p) * 1000);
  });
}

// Retour du navigateur ait un point de départ valide dès le premier clic.
try{
  history.replaceState(
    { page: appState.page, ids: Object.fromEntries(NAV_ID_KEYS.map(k=>[k, appState[k]])) },
    '', '#'+appState.page
  );
}catch(e){}

render();

// ── Restauration de session au chargement de la page ──
// auth.currentUser n'est qu'une variable JS en mémoire : sans ceci, un simple
// rechargement de page "déconnecte" l'app même si la session Supabase (JWT en
// localStorage) est toujours valide — d'où les formulaires qui se vident et
// les vérifications "connectez-vous" qui réapparaissent à tort.
_sb.auth.getSession().then(({ data: { session } }) => {
  if(session?.user && !auth.currentUser){
    const meta = session.user.user_metadata || {};
    auth.currentUser = {
      id: session.user.id,
      role: meta.role || 'user',
      firstName: meta.first_name || session.user.email.split('@')[0],
      lastName:  meta.last_name  || '',
      email:     session.user.email,
      emailVerified: true,
      createdAt: session.user.created_at?.split('T')[0] || '',
      bankData: { preferredMethod: 'virement' }
    };
    renderAuthArea();
    render();
  }
}).catch(e => console.warn('Restauration de session échouée:', e.message));

/* ===================== CHARGEMENT DES ANNONCES PUBLIÉES (Supabase) ===================== */
async function loadPublishedAnnonces(){
  try{
    const { data, error } = await _sb.from('annonces').select('*').eq('status','publiée').order('created_at',{ascending:false});
    if(error){ console.warn('Erreur chargement annonces publiées:', error.message); return; }

    (data||[]).forEach((a, i) => {
      if(hotels.some(h=>h.annonceId===a.id)) return; // évite les doublons si déjà fusionné
      hotels.push({
        id: 100000 + i,
        annonceId: a.id,
        annonceRef: a.ref,
        userId: a.user_id || null,
        contactFirstname: a.contact_firstname || '',
        contactLastname: a.contact_lastname || '',
        contactEmail: a.contact_email || '',
        contactPhone: a.contact_phone || '',
        lat: a.lat ? parseFloat(a.lat) : (36.8 + Math.random()*2),
        lng: a.lng ? parseFloat(a.lng) : (9.5 + Math.random()*2),
        minNights: a.min_stay || 1,
        name: a.name || 'Hébergement',
        city: a.city || '',
        country: a.country || 'Tunisie',
        type: a.type_label || a.type || 'Hébergement',
        stars: a.stars || 3,
        capacity: a.capacity || 2,
        rooms: a.rooms || 1,
        rating: 0,
        ratingLabel: 'Nouveau',
        reviews: 0,
        price: a.price_night || 0,
        emoji: a.emoji || '🏠',
        features: a.amenities || [],
        desc: a.description || '',
        address: a.address || '',
        checkin: a.checkin || '15:00',
        checkout: a.checkout || '11:00',
        access: a.access || '',
        photos: a.photos || [],
        createdAt: a.created_at || null,
        freeCancellation: a.cancellation === 'flexible',
        payLater: true,
        discount: a.discount_percent || 0
      });
    });

    render();
  } catch(e){ console.warn('Erreur loadPublishedAnnonces:', e.message); }
}
loadPublishedAnnonces();


/* ===================== PHOTO PROFIL ===================== */
function uploadProfilPhoto(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){
    showToast('Format non supporté (JPG, PNG, WebP)','var(--red)'); return;
  }
  if(file.size > 5*1024*1024){
    showToast('Image trop lourde (max 5 Mo)','var(--red)'); return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    if(auth.currentUser) auth.currentUser.photo = e.target.result;
    const i = auth.users.findIndex(u=>u.id===auth.currentUser.id);
    if(i>=0) auth.users[i].photo = e.target.result;
    navigate('profil');
    showToast('Photo de profil mise à jour !','var(--green)');
  };
  reader.onerror = function(){ showToast('Erreur de lecture','var(--red)'); };
  reader.readAsDataURL(file);
}

/* ===================== LEAFLET MAPS ===================== */
let annMap = null;
let annMarker = null;
let hotelMap = null;

// Hotel coords lookup
const hotelCoords = {
  1:[48.8602,2.3477],2:[41.8955,12.4823],3:[35.7101,139.8107],
  4:[41.3917,2.1643],5:[51.5236,-0.1579],6:[36.4610,25.3763],
  7:[25.0805,55.1403],8:[35.0116,135.7681],
};

function initHotelMap(hId){
  const coords = hotelCoords[hId] || [48.8566,2.3522];
  const mapEl = document.getElementById('hotel-map-'+hId);
  if(!mapEl || mapEl._leaflet_id) return;
  setTimeout(()=>{
    const map = L.map('hotel-map-'+hId, {scrollWheelZoom:false}).setView(coords, 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
      attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
      subdomains:'abcd', maxZoom:19
    }).addTo(map);
    const icon = L.divIcon({
      html:'<div style="background:var(--blue);color:#fff;border-radius:50% 50% 50% 0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.3);transform:rotate(-45deg);"><span style="transform:rotate(45deg)">🏨</span></div>',
      iconSize:[36,36], iconAnchor:[18,36], className:''
    });
    L.marker(coords, {icon}).addTo(map).bindPopup('<strong>'+document.querySelector('.det-name')?.textContent+'</strong>').openPopup();
    // Draw 500m radius circle
    L.circle(coords, {radius:300, color:'var(--blue)', fillColor:'#003580', fillOpacity:0.07, weight:1.5}).addTo(map);
    hotelMap = map;
  }, 100);
}

function initAnnMap(){
  const mapEl = document.getElementById('ann-map');
  if(!mapEl){ console.warn('ann-map not found'); return; }
  // Destroy existing map instance if any
  if(annMap){ try{ annMap.remove(); }catch(e){} annMap=null; annMarker=null; }

  // Initialize map synchronously (DOM element already exists)
  annMap = L.map('ann-map', {scrollWheelZoom:false}).setView([46.6034, 1.8883], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd', maxZoom:19
  }).addTo(annMap);

  // Click on map to place marker
  annMap.on('click', function(e){
    placeAnnMarker(e.latlng.lat, e.latlng.lng);
  });

  // If coords already saved → place marker immediately
  const savedLat = parseFloat(appState.annonceData.lat);
  const savedLng = parseFloat(appState.annonceData.lng);
  if(!isNaN(savedLat) && !isNaN(savedLng)){
    annMap.setView([savedLat, savedLng], 14);
    placeAnnMarker(savedLat, savedLng);
  }
}

function placeAnnMarker(lat, lng){
  if(!annMap) return;
  const icon = L.divIcon({
    html:'<div style="background:#cc0000;border:3px solid #fff;border-radius:50%;width:18px;height:18px;box-shadow:0 2px 6px rgba(0,0,0,.4);"></div>',
    iconSize:[18,18], iconAnchor:[9,9], className:''
  });
  if(annMarker) annMap.removeLayer(annMarker);
  annMarker = L.marker([lat,lng], {icon, draggable:true}).addTo(annMap);
  annMarker.on('dragend', function(e){
    const p = e.target.getLatLng();
    updateCoordsDisplay(p.lat, p.lng);
  });
  updateCoordsDisplay(lat, lng);
  appState.annonceData.lat = lat;
  appState.annonceData.lng = lng;
}

function updateCoordsDisplay(lat, lng){
  const el = document.getElementById('ann-map-coords');
  if(el){
    el.textContent = '✅ Coordonnées : ' + lat.toFixed(6) + ', ' + lng.toFixed(6);
    el.style.color = 'var(--green)';
  }
  appState.annonceData.lat = lat;
  appState.annonceData.lng = lng;
}

async function geocodeAddress(){
  const ad = appState.annonceData;
  const query = [ad.address, ad.city, ad.zip, ad.country].filter(Boolean).join(', ');
  if(!query.trim()){showToast('⚠️ Remplissez d\'abord votre adresse','var(--red)');return;}

  // Find button by text content (more robust)
  const btns = Array.from(document.querySelectorAll('button'));
  const btn = btns.find(b=>b.textContent.includes('Localiser'));
  if(btn){btn.textContent='⏳ Recherche...';btn.disabled=true;}

  try {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(query)+'&limit=1';
    const res = await fetch(url, {headers:{'Accept-Language':'fr','User-Agent':'MyTunigo/1.0'}});
    const data = await res.json();
    if(data && data.length>0){
      const lat=parseFloat(data[0].lat), lng=parseFloat(data[0].lon);
      // Ensure map is ready before placing marker
      if(!annMap){
        initAnnMap();
        setTimeout(()=>{
          if(annMap){annMap.setView([lat,lng],15);placeAnnMarker(lat,lng);}
        },400);
      } else {
        annMap.setView([lat,lng],15);
        placeAnnMarker(lat,lng);
      }
      appState.annonceData.lat=lat;
      appState.annonceData.lng=lng;
      showToast('📍 Adresse localisée avec succès !','var(--green)');
    } else {
      showToast('Adresse introuvable — vérifiez ou cliquez sur la carte','var(--gray-700)');
    }
  } catch(e){
    showToast('Erreur réseau — vérifiez votre connexion','var(--red)');
  }
  if(btn){btn.textContent='🔍 Localiser sur la carte';btn.disabled=false;}
}

      <div style="font-size:36px;margin-bottom:12px;">🔐</div>
      <p style="font-size:14px;color:var(--gray-600);margin-bottom:20px;line-height:1.6;">

      </p>

    </div>
    <div class="f-field" style="margin-bottom:16px;">
      <label>Confirmer</label>
      <div class="pw-wrap">
        <input type="password" id="rp-confirm" placeholder="Répétez le mot de passe">
        <button class="pw-toggle" onclick="togglePw(\'rp-confirm\',this)">👁️</button>
      </div>
    </div>
    <div id="rp-msg" style="display:none;padding:10px 14px;border-radius:var(--r-md);font-size:13px;margin-bottom:14px;"></div>
    <button id="rp-btn" onclick="submitNewPassword()"
      style="width:100%;background:var(--blue);color:#fff;padding:13px;border-radius:var(--r-md);font-size:16px;font-weight:700;border:none;cursor:pointer;">
      Enregistrer le mot de passe
    </button>
  </div>`;
  overlay.appendChild(modal);
  root.appendChild(overlay);
}

async function submitNewPassword(){
  const pw      = document.getElementById('rp-password')?.value;
  const confirm = document.getElementById('rp-confirm')?.value;
  const msgEl   = document.getElementById('rp-msg');
  const btn     = document.getElementById('rp-btn');

  if(!pw || pw.length < 8){
    msgEl.textContent='Mot de passe trop court (min. 8 caractères).';
    msgEl.style.background='#fff0f0';msgEl.style.color='var(--red)';msgEl.style.display='block';
    return;
  }
  if(pw !== confirm){
    msgEl.textContent='Les mots de passe ne correspondent pas.';
    msgEl.style.background='#fff0f0';msgEl.style.color='var(--red)';msgEl.style.display='block';
    return;
  }
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner-sm"></span> Enregistrement…';}

  const { error } = await _sb.auth.updateUser({ password: pw });

  if(error){
    if(btn){btn.disabled=false;btn.textContent='Enregistrer le mot de passe';}
    msgEl.textContent='Erreur : ' + error.message;
    msgEl.style.background='#fff0f0';msgEl.style.color='var(--red)';msgEl.style.display='block';
  } else {
    msgEl.innerHTML='✅ Mot de passe mis à jour ! Vous pouvez vous connecter.';
    msgEl.style.background='#f0fff8';msgEl.style.color='var(--green)';msgEl.style.display='block';
    if(btn){btn.style.display='none';}
    history.replaceState(null, '', window.location.pathname);
    setTimeout(()=>{ closeModal(); modalMode='login'; renderModal(); openModal(); }, 2500);
  }
}
